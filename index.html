<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lessons">
<meta name="theme-color" content="#2D6A4F">
<title>Lesson Logger</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* Surfaces */
  --bg: #FAF8F4;
  --card: #FFFFFF;
  --cream: #F3EEE5;
  /* Ink & text */
  --text: #1A1814;
  --muted: #737069;
  --muted-2: #A29E94;
  /* Lines */
  --border: #ECE8DF;
  --border-2: #DEDACF;
  /* Accent (refined forest) */
  --accent: #245740;
  --accent-lt: #EBF0EC;
  --accent-dk: #173A2A;
  --warm: #F1ECE2;
  /* Semantic */
  --danger: #9F3B35;
  --danger-lt: #F7ECEA;
  --warning: #B98533;
  --warning-lt: #F6EEDE;
  /* Radii */
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-pill: 999px;
  --radius: 14px; /* legacy alias */
  /* Shadow */
  --shadow-sm: 0 1px 2px rgba(20,18,15,0.04);
  --shadow-md: 0 2px 10px rgba(20,18,15,0.06);
  /* Type */
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: var(--font); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, transform 80ms ease; }
button:active { transform: scale(0.985); }
input, textarea, select { font-family: var(--font); }
.num { font-variant-numeric: tabular-nums; }

/* ─── Header ─── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 22px; border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.88); backdrop-filter: saturate(1.2) blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.back-btn { background: none; border: none; font-size: 14px; color: var(--accent); font-weight: 600; padding: 4px 0; letter-spacing: -0.005em; }
.add-btn { background: var(--accent-lt); border: none; font-size: 12px; color: var(--accent); padding: 7px 14px; border-radius: var(--r-pill); font-weight: 600; letter-spacing: 0.01em; }
.add-btn:active { background: #DDE7DE; }

/* ─── Home ─── */
.home-header {
  padding: 28px 24px 18px; background: var(--card);
  border-bottom: 1px solid var(--border);
}
.home-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.035em; line-height: 1.1; }
.home-header p { font-size: 14px; color: var(--muted); margin-top: 6px; letter-spacing: -0.005em; }

/* ─── Summary ─── */
.summary {
  margin: 16px 22px 0; background: var(--card); border-radius: var(--r-lg);
  padding: 18px 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}
.summary-title { font-size: 10px; font-weight: 700; color: var(--muted-2); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
.summary-grid { display: flex; justify-content: space-between; }
.summary-item { text-align: center; flex: 1; }
.summary-item + .summary-item { border-left: 1px solid var(--border); }
.summary-val { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.summary-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 0.01em; }

/* ─── Content ─── */
.content { padding: 14px 22px; }

/* ─── Student / Parent buttons ─── */
.item-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 8px;
  text-align: left;
}
.item-btn:active { border-color: var(--accent); background: #FDFCF9; }
.item-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; display: block; }
.item-sub { font-size: 12px; color: var(--muted); margin-top: 2px; letter-spacing: -0.005em; }
.item-arrow { font-size: 14px; color: var(--muted-2); }
.item-meta { display: flex; align-items: center; gap: 10px; }

/* ─── Lesson type grid ─── */
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.type-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 8px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); text-align: center;
}
.type-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.type-btn .label { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.type-btn .sub { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: -0.005em; }
.type-btn.active .sub { color: rgba(255,255,255,0.75); }
.type-btn .price { font-size: 12px; font-weight: 600; color: var(--accent); margin-top: 6px; letter-spacing: -0.005em; font-variant-numeric: tabular-nums; }
.type-btn.active .price { color: #fff; }

/* ─── Duration grid ─── */
.dur-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.dur-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 13px 6px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.dur-btn.active { background: var(--accent); border-color: var(--accent); }
.dur-btn .val { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.dur-btn.active .val { color: #fff; }
.dur-btn .unit { font-size: 10px; color: var(--muted); margin-top: 1px; letter-spacing: 0.02em; }
.dur-btn.active .unit { color: rgba(255,255,255,0.7); }

/* ─── Price section ─── */
.price-box { margin-top: 20px; background: var(--cream); border-radius: var(--r-md); padding: 16px 16px 14px; border: 1px solid var(--border); }
.price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.price-lbl { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: -0.005em; }
.price-input-wrap { display: flex; align-items: center; gap: 4px; }
.price-currency { font-size: 15px; font-weight: 600; color: var(--accent); }
.price-input {
  width: 68px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
  font-size: 15px; font-weight: 600; text-align: right; outline: none; background: var(--card);
  font-variant-numeric: tabular-nums;
}
.price-input:focus { border-color: var(--accent); }
.reset-price { background: none; border: none; color: var(--accent); font-size: 11px; padding: 0; margin-bottom: 6px; font-weight: 500; letter-spacing: 0.005em; opacity: 0.8; }
.reset-price:hover { opacity: 1; }
.total-row { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid var(--border-2); padding-top: 12px; margin-top: 10px; }
.total-lbl { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.total-val { font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: -0.025em; font-variant-numeric: tabular-nums; }

/* ─── Forms ─── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
.form-input {
  width: 100%; padding: 12px 14px; border-radius: var(--r-sm); border: 1px solid var(--border);
  font-size: 15px; background: var(--card); outline: none; color: var(--text);
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lt); }
textarea.form-input { resize: vertical; line-height: 1.5; }

/* ─── Section label ─── */
.section-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 10px; margin-top: 0; text-transform: uppercase; letter-spacing: 0.1em; }
.section-divider { border-top: 1px solid var(--border); padding-top: 18px; margin-top: 18px; margin-bottom: 14px; }

/* ─── Buttons ─── */
.btn-primary {
  width: 100%; padding: 14px; border-radius: var(--r-md); border: none;
  background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.005em;
}
.btn-primary:active { background: var(--accent-dk); }
.btn-primary:disabled { opacity: 0.35; }
.btn-secondary {
  width: 100%; padding: 12px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 14px; font-weight: 600; letter-spacing: -0.005em;
}
.btn-secondary:active { background: var(--bg); }
.btn-delete {
  width: 100%; padding: 12px; border-radius: var(--r-md); border: none;
  background: none; color: var(--danger); font-size: 13px; font-weight: 600; margin-top: 14px; letter-spacing: -0.005em;
}
.btn-delete:active { background: var(--danger-lt); }
.btn-import {
  display: flex; align-items: center; gap: 12px; width: 100%;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--r-md);
  padding: 14px 16px; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.005em;
}

/* ─── Add student inline ─── */
.add-student-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
.add-student-row input { flex: 1; }
.add-student-btn {
  padding: 11px 16px; border-radius: var(--r-sm); border: none;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; white-space: nowrap; letter-spacing: -0.005em;
}

/* ─── Override rows ─── */
.override-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid var(--border);
}
.override-row:last-child { border-bottom: none; }
.override-label { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: -0.005em; }
.override-input {
  width: 64px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
  font-size: 14px; font-weight: 600; text-align: right; outline: none; background: var(--card);
  font-variant-numeric: tabular-nums;
}
.override-input:focus { border-color: var(--accent); }

/* ─── History ─── */
.month-block { margin-bottom: 28px; }
.month-header { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 0 10px; border-bottom: 1px solid var(--border-2); }
.month-label { font-size: 18px; font-weight: 700; letter-spacing: -0.025em; }
.month-total { font-size: 14px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
.hist-parent { background: var(--card); border-radius: var(--r-md); border: 1px solid var(--border); padding: 12px 14px; margin-top: 10px; }
.hist-parent-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.hist-parent-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.hist-parent-total { font-size: 13px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }
.lesson-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-top: 1px solid var(--border); }
.lesson-info { flex: 1; }
.lesson-student { font-size: 13px; font-weight: 500; letter-spacing: -0.005em; display: block; }
.lesson-meta { font-size: 11px; color: var(--muted); margin-top: 1px; letter-spacing: -0.005em; }
.lesson-total { font-size: 13px; font-weight: 600; color: var(--accent); min-width: 54px; text-align: right; font-variant-numeric: tabular-nums; }
.lesson-del { background: none; border: none; color: var(--muted-2); font-size: 14px; padding: 4px 6px; }
.lesson-del:active { color: var(--danger); }

/* ─── Agenda (day-planner review) ─── */
.agenda-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; }
.agenda-nav button { flex: 0 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 9px 13px; font-size: 16px; font-weight: 500; color: var(--text); }
.agenda-nav button:active { background: var(--bg); border-color: var(--border-2); }
.agenda-date { flex: 1; text-align: center; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.agenda-summary { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: baseline; }
.agenda-summary > span:first-child { font-size: 13px; color: var(--muted); font-weight: 500; letter-spacing: -0.005em; }
.agenda-summary > span:last-child { font-size: 15px; color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.015em; }
.agenda-grid { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }
.agenda-row { display: flex; height: 60px; border-top: 1px solid var(--border); }
.agenda-row:first-child { border-top: none; }
.agenda-hour { flex: 0 0 54px; padding: 5px 8px 0 12px; font-size: 10px; font-weight: 600; color: var(--muted-2); letter-spacing: 0.06em; border-right: 1px solid var(--border); font-variant-numeric: tabular-nums; }
.agenda-slot { flex: 1; position: relative; }
.agenda-blocks { position: absolute; left: 54px; right: 0; top: 0; bottom: 0; pointer-events: none; }
.agenda-block {
  position: absolute; left: 8px; right: 8px;
  background: var(--accent); color: #fff; border-radius: 10px;
  padding: 7px 11px 7px 13px; overflow: hidden; pointer-events: auto;
  box-shadow: 0 1px 2px rgba(23,58,42,0.14);
  display: flex; flex-direction: column; gap: 4px;
  cursor: default;
}
.agenda-block.compact { cursor: pointer; padding: 5px 11px; }
.agenda-block.compact:active { background: var(--accent-dk); }
.agenda-block-header { display: flex; justify-content: space-between; align-items: baseline; font-size: 10px; font-weight: 600; opacity: 0.82; letter-spacing: 0.04em; text-transform: uppercase; }
.agenda-block-header .agenda-block-count { opacity: 0.9; font-variant-numeric: tabular-nums; }
.agenda-members { display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
.agenda-member {
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.13); border: none; color: #fff;
  font-family: var(--font); padding: 5px 10px; border-radius: 7px;
  font-size: 13px; font-weight: 500; letter-spacing: -0.005em; text-align: left;
  -webkit-tap-highlight-color: transparent;
}
button.agenda-member { cursor: pointer; }
.agenda-member:active { background: rgba(255,255,255,0.28); }
.agenda-member-price { font-size: 11px; font-weight: 600; opacity: 0.9; margin-left: 8px; font-variant-numeric: tabular-nums; }
.agenda-block.compact .agenda-members { flex-direction: row; flex-wrap: wrap; gap: 4px; }
.agenda-block.compact .agenda-member { padding: 2px 8px; font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.16); }
.agenda-block.compact .agenda-member-price { display: none; }

/* ─── Info / Warning ─── */
.info-box { background: var(--accent-lt); border-radius: var(--r-md); padding: 13px 16px; margin-bottom: 18px; border: 1px solid rgba(36,87,64,0.1); }
.info-text { font-size: 13px; line-height: 1.5; color: var(--accent); letter-spacing: -0.005em; }
.warning-box { background: var(--warning-lt); border: 1px solid rgba(185,133,51,0.22); border-radius: var(--r-md); padding: 11px 15px; margin-bottom: 12px; font-size: 12px; color: #7C5720; letter-spacing: -0.005em; }

/* ─── Preview ─── */
.preview-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 14px; margin-top: 12px; }
.preview-header { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
.preview-row { display: flex; justify-content: space-between; padding: 6px 0; border-top: 1px solid var(--border); font-size: 13px; font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }

/* ─── Empty state ─── */
.empty { text-align: center; padding: 48px 20px; }
.empty-icon { font-size: 38px; margin-bottom: 14px; opacity: 0.65; }
.empty-text { font-size: 14px; color: var(--muted); margin-bottom: 20px; letter-spacing: -0.005em; }

/* ─── Bottom nav ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; display: flex; justify-content: space-around;
  background: rgba(255,255,255,0.92); backdrop-filter: saturate(1.2) blur(10px);
  border-top: 1px solid var(--border);
  padding: 8px 0 env(safe-area-inset-bottom, 8px); z-index: 20;
}
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; padding: 7px 14px; color: var(--muted); }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 18px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.02em; }

/* ─── Toast ─── */
.toast {
  position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
  background: #1A1814; color: #F7F6F3; padding: 11px 22px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 500; z-index: 100; box-shadow: 0 6px 20px rgba(20,18,15,0.18);
  animation: fadeIn 0.22s ease; letter-spacing: -0.005em;
}
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ─── Settings ─── */
.settings-btn {
  position: absolute; right: 22px; top: 30px; background: none; border: none;
  font-size: 19px; color: var(--muted-2); padding: 4px; opacity: 0.85;
}
.settings-btn:active { opacity: 1; }

/* ─── Loading ─── */
.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; color: var(--muted); font-size: 14px; letter-spacing: -0.005em; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Search */
.search-input {
  width: 100%; padding: 11px 14px; border-radius: var(--r-sm); border: 1px solid var(--border);
  font-size: 14px; background: var(--card); outline: none; margin-bottom: 12px;
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lt); }

.hidden { display: none; }
</style>
</head>
<body>

<div id="app"></div>
<div style="text-align:center; padding:20px 22px 28px; font-size:10px; color:var(--muted-2); letter-spacing:0.08em; text-transform:uppercase; font-weight:600;">
  v2026-04-19
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────

const LESSON_TYPES = [
  { id: 'ind_pres', label: 'Individual', sub: 'Presencial', short: 'Ind · Pres' },
  { id: 'ind_online', label: 'Individual', sub: 'Online', short: 'Ind · Online' },
  { id: 'grp_pres', label: 'Group', sub: 'Presencial', short: 'Group · Pres' },
  { id: 'grp_online', label: 'Group', sub: 'Online', short: 'Group · Online' },
];

const DEFAULT_PRICES = { ind_pres: 30, ind_online: 25, grp_pres: 20, grp_online: 15 };

// ─── State ───────────────────────────────────────────────────────────────────

let state = {
  view: 'home',
  apiUrl: localStorage.getItem('ll_api_url') || '',
  parents: [],
  students: [],
  lessons: [],
  config: { ...DEFAULT_PRICES },
  loading: false,
  toast: null,
  // Selection
  selStudent: null,
  selParent: null,
  searchQuery: '',
};

// ─── API ─────────────────────────────────────────────────────────────────────

async function api(method, body) {
  if (!state.apiUrl) { showToast('⚠️ Set API URL in Settings'); return null; }
  try {
    // Google Apps Script CORS workaround:
    // ALL requests go through POST with text/plain to avoid CORS preflight.
    // GET requests are converted to POST with an action parameter.
    const r = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
      redirect: 'follow',
    });
    return await r.json();
  } catch (e) {
    console.error('API error:', e);
    showToast('⚠️ Connection error — check console');
    return null;
  }
}

async function loadAll() {
  state.loading = true;
  render();
  const data = await api('POST', { action: 'getAll' });
  if (data && !data.error) {
    state.parents = data.parents || [];
    state.students = data.students || [];
    state.lessons = (data.lessons || []).map(l => {
      const dur = parseFloat(String(l.duration).replace(',', '.')) || 0;
      const pph = parseFloat(String(l.pricePerHour).replace(',', '.')) || 0;
      const tot = parseFloat(String(l.total).replace(',', '.')) || 0;
      if (dur === 0 && l.duration) console.log('Duration parse issue:', l.duration, typeof l.duration);
      return { ...l, duration: dur, pricePerHour: pph, total: tot };
    });
    if (data.config) {
      state.config = {
        ind_pres: Number(data.config.price_ind_pres) || DEFAULT_PRICES.ind_pres,
        ind_online: Number(data.config.price_ind_online) || DEFAULT_PRICES.ind_online,
        grp_pres: Number(data.config.price_grp_pres) || DEFAULT_PRICES.grp_pres,
        grp_online: Number(data.config.price_grp_online) || DEFAULT_PRICES.grp_online,
      };
    }
  } else if (data?.error) {
    showToast('⚠️ ' + data.error);
  }
  state.loading = false;
  render();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────

function getPrice(student, typeId) {
  if (student?.priceOverrides?.[typeId] != null) return student.priceOverrides[typeId];
  return state.config[typeId] ?? DEFAULT_PRICES[typeId];
}

function getParentName(parentId) {
  const p = state.parents.find(p => p.id === parentId);
  return p ? p.name : '(unknown parent)';
}

function getStudentName(studentId) {
  const s = state.students.find(s => s.id === studentId);
  return s ? s.name : '(unknown student)';
}

function getLessonType(id) { return LESSON_TYPES.find(t => t.id === id) || LESSON_TYPES[0]; }
function getCurrentMonth() { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; }
function getMonthLabel(ds) {
  var parts = String(ds).split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, 1);
  return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
}
function formatDate(ds) {
  var s = String(ds).slice(0, 10);
  // Parse YYYY-MM-DD manually to avoid timezone issues
  var parts = s.split('-');
  if (parts.length === 3) {
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    return d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' });
  }
  return s;
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

// ─── Time picker (24h, 15-min steps, mobile-friendly) ───────────────────────
// Two native <select>s — native selects open OS pickers on phones, and always
// render as 24h regardless of the user's locale.
function timePicker(idPrefix, value) {
  var v = String(value || '09:00');
  var parts = v.split(':');
  var hh = parts[0] ? parts[0].padStart(2,'0') : '09';
  var mmRaw = parts[1] ? parseInt(parts[1], 10) : 0;
  // Snap to nearest 15-minute slot
  var snap = Math.round(mmRaw / 15) * 15;
  if (snap === 60) { snap = 0; hh = String((parseInt(hh,10) + 1) % 24).padStart(2,'0'); }
  var mm = String(snap).padStart(2,'0');

  var hourOpts = [];
  for (var i = 0; i < 24; i++) {
    var s = String(i).padStart(2, '0');
    hourOpts.push(h('option', { value: s, ...(s === hh ? { selected: 'selected' } : {}) }, s));
  }
  var minOpts = ['00','15','30','45'].map(function(s) {
    return h('option', { value: s, ...(s === mm ? { selected: 'selected' } : {}) }, s);
  });

  var hourSel = h('select', { className: 'form-input', id: idPrefix + '-hh', style: { flex: '1', textAlign: 'center' } }, ...hourOpts);
  var minSel = h('select', { className: 'form-input', id: idPrefix + '-mm', style: { flex: '1', textAlign: 'center' } }, ...minOpts);
  var colon = h('span', { style: { fontSize: '18px', color: 'var(--muted)', alignSelf: 'center' } }, ':');

  return h('div', { style: { display: 'flex', gap: '6px', alignItems: 'stretch' } }, hourSel, colon, minSel);
}

function readTimeValue(idPrefix) {
  var hh = document.getElementById(idPrefix + '-hh');
  var mm = document.getElementById(idPrefix + '-mm');
  if (!hh || !mm) return '';
  return hh.value + ':' + mm.value;
}

function navigate(view, extra = {}) {
  state.view = view;
  state.searchQuery = '';
  Object.assign(state, extra);
  render();
  window.scrollTo(0, 0);
}

// ─── Render engine ───────────────────────────────────────────────────────────

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'onclick' || k === 'onchange' || k === 'oninput') el[k] = v;
    else if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const views = {
    home: renderHome,
    log: renderLog,
    editLesson: renderEditLesson,

    editStudent: renderEditStudent,
    pricing: renderPricing,
    history: renderHistory,
    review: renderReview,
    cohort: renderCohort,
    settings: renderSettings,
  };

  const fn = views[state.view] || renderHome;
  app.appendChild(fn());

  if (state.view === 'home') app.appendChild(renderBottomNav());

function updateLogUI() {
  const durSec = document.getElementById('dur-section');
  const priceSec = document.getElementById('price-section');
  if (!durSec || !priceSec) return;

  if (state._selType) durSec.classList.remove('hidden');
  else { durSec.classList.add('hidden'); priceSec.classList.add('hidden'); return; }

  if (!state._selDur) { priceSec.classList.add('hidden'); return; }
  priceSec.classList.remove('hidden');

  // Only rebuild when the type/duration context changes. Rebuilding on every
  // price-input keystroke destroys the input and kills focus on mobile — iOS
  // dismisses the keyboard between keystrokes, making the field unusable.
  const key = state._selType + '|' + state._selDur;
  if (priceSec.dataset.builtKey !== key) {
    priceSec.dataset.builtKey = key;
    priceSec.innerHTML = '';
    priceSec.appendChild(buildLogPriceBox());
    // Scroll the section into view so the Log button is visible without
    // manual scrolling after picking a duration.
    if (priceSec.scrollIntoView) priceSec.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  updateLogTotals();
}

function buildLogPriceBox() {
  const st = state.selStudent;
  const stdPrice = getPrice(st, state._selType);
  const initial = state._customPrice != null ? state._customPrice : stdPrice;

  const priceInput = h('input', {
    className: 'price-input', type: 'number', inputmode: 'decimal',
    min: '0', step: '0.5', value: String(initial),
    oninput: (e) => {
      state._customPrice = e.target.value === '' ? null : parseFloat(e.target.value);
      updateLogTotals();
    }
  });

  const resetBtn = h('button', {
    className: 'reset-price', style: { display: 'none' },
    onclick: () => {
      state._customPrice = null;
      priceInput.value = String(stdPrice);
      updateLogTotals();
    }
  }, 'Reset to standard (€' + stdPrice + ')');

  return h('div', { className: 'price-box' },
    h('div', { className: 'price-row' },
      h('span', { className: 'price-lbl' }, 'Price per hour'),
      h('div', { className: 'price-input-wrap' },
        h('span', { className: 'price-currency' }, '€'),
        priceInput
      )
    ),
    resetBtn,
    h('div', { className: 'total-row' },
      h('span', { className: 'total-lbl' }, 'Total'),
      h('span', { className: 'total-val' }, '€0.00')
    ),
    h('button', {
      className: 'btn-primary', style: { marginTop: '14px' },
      onclick: async () => {
        const st2 = state.selStudent;
        if (!st2 || !state._selType || state._selDur == null) return;
        const date = document.getElementById('log-date').value;
        const time = readTimeValue('log-time');
        const selType = state._selType;
        const selDur = state._selDur;
        // Read price at click-time — the stored _customPrice may have changed
        // since the box was built (the box is now built once per type/dur combo).
        const stdP = getPrice(st2, selType);
        const price = state._customPrice != null ? state._customPrice : stdP;
        const lessonTotal = selDur * price;
        const tempId = 'tmp_' + Math.random().toString(36).slice(2, 8);
        const lessonData = {
          id: tempId, studentId: st2.id, parentId: st2.parentId,
          date, time, lessonType: selType, duration: selDur,
          pricePerHour: price, total: lessonTotal
        };
        // Optimistic: show immediately
        state.lessons.push(lessonData);
        showToast('✓ ' + selDur + 'h for ' + st2.name);
        navigate('home');
        // Save in background with captured values
        const r = await api('POST', {
          action: 'addLesson', studentId: st2.id, parentId: st2.parentId,
          date, time, lessonType: selType, duration: selDur,
          pricePerHour: price, total: lessonTotal
        });
        if (r?.success) {
          const idx = state.lessons.findIndex(l => l.id === tempId);
          if (idx >= 0) state.lessons[idx].id = r.id;
        } else {
          state.lessons = state.lessons.filter(l => l.id !== tempId);
          showToast('⚠️ Failed to save lesson');
          render();
        }
      }
    }, 'Log lesson')
  );
}

function updateLogTotals() {
  const priceSec = document.getElementById('price-section');
  if (!priceSec) return;
  const st = state.selStudent;
  if (!st || !state._selType || state._selDur == null) return;
  const stdPrice = getPrice(st, state._selType);
  const displayPrice = state._customPrice != null ? state._customPrice : stdPrice;
  const totalEl = priceSec.querySelector('.total-val');
  if (totalEl) totalEl.textContent = '€' + (state._selDur * displayPrice).toFixed(2);
  const resetBtn = priceSec.querySelector('.reset-price');
  if (resetBtn) {
    const show = state._customPrice != null && state._customPrice !== stdPrice;
    resetBtn.style.display = show ? '' : 'none';
  }
}

// ─── Review (daily-planner agenda view) ────────────────────────────────────
// Day at a time, auto-fit hour range (08:00–20:00 fallback), lessons rendered
// as absolutely-positioned blocks with height proportional to duration.
// Tap a block to edit. Empty slots are inert.
const AGENDA_PX_PER_HOUR = 60;
const AGENDA_FALLBACK_START = 8;   // 08:00
const AGENDA_FALLBACK_END = 20;    // 20:00 (exclusive, so rows 08–19 are drawn)

function parseTimeToMin(t) {
  if (!t) return null;
  var parts = String(t).split(':');
  if (parts.length < 2) return null;
  var hh = parseInt(parts[0], 10);
  var mm = parseInt(parts[1], 10);
  if (isNaN(hh) || isNaN(mm)) return null;
  return hh * 60 + mm;
}

function addDaysYMD(ymd, delta) {
  var p = String(ymd).split('-');
  var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
  d.setDate(d.getDate() + delta);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatHm(min) {
  var h = Math.floor(min / 60) % 24;
  var m = min % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

// Group lessons that share (date, startMin, durMin, lessonType) into cohorts.
// Every group lesson with multiple students logged at the same slot collapses
// to a single block with every student listed.
function buildCohorts(lessonsWithPos, date) {
  const map = new Map();
  for (const it of lessonsWithPos) {
    const key = date + '|' + it.startMin + '|' + it.durMin + '|' + it.l.lessonType;
    if (!map.has(key)) {
      map.set(key, { date, startMin: it.startMin, durMin: it.durMin, lessonType: it.l.lessonType, members: [] });
    }
    map.get(key).members.push(it.l);
  }
  // Stable ordering: time ascending, then by lessonType for deterministic layout.
  return [...map.values()].sort((a, b) => a.startMin - b.startMin || a.lessonType.localeCompare(b.lessonType));
}

// Serializable cohort handle — survives re-renders and state.lessons updates.
function cohortKey(c) {
  return { date: c.date, startMin: c.startMin, durMin: c.durMin, lessonType: c.lessonType };
}

function renderReview() {
  const wrap = h('div');
  wrap.appendChild(renderHeader('Review', () => navigate('home')));

  const content = h('div', { className: 'content' });

  // Day picker — default to today (or the last recorded day if today is empty and no prior selection)
  const now = new Date();
  const todayYmd = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const selectedDate = state._reviewDate || todayYmd;

  // Day navigator
  const nav = h('div', { className: 'agenda-nav' },
    h('button', { onclick: () => { state._reviewDate = addDaysYMD(selectedDate, -1); render(); } }, '‹'),
    h('input', {
      className: 'form-input', type: 'date', value: selectedDate,
      style: { flex: '1', textAlign: 'center', fontWeight: '700' },
      onchange: (e) => { state._reviewDate = e.target.value || todayYmd; render(); }
    }),
    h('button', { onclick: () => { state._reviewDate = addDaysYMD(selectedDate, 1); render(); } }, '›'),
    h('button', {
      onclick: () => { state._reviewDate = todayYmd; render(); },
      style: { fontSize: '12px', padding: '8px 10px' }
    }, 'Today')
  );
  content.appendChild(nav);

  // Day's lessons
  const dayLessons = state.lessons
    .filter(l => String(l.date).slice(0, 10) === selectedDate)
    .map(l => {
      const startMin = parseTimeToMin(l.time);
      const durMin = Math.max(15, Math.round(Number(l.duration) * 60));
      return { l, startMin: startMin == null ? 9 * 60 : startMin, durMin };
    })
    .sort((a, b) => a.startMin - b.startMin);

  // Summary row
  const dayTotal = dayLessons.reduce((s, x) => s + Number(x.l.total || 0), 0);
  const dayHours = dayLessons.reduce((s, x) => s + Number(x.l.duration || 0), 0);
  content.appendChild(h('div', { className: 'agenda-summary' },
    h('span', {}, dayLessons.length + (dayLessons.length === 1 ? ' lesson' : ' lessons') + ' · ' + dayHours + 'h'),
    h('span', {}, '€' + dayTotal.toFixed(2))
  ));

  // Determine hour range — auto-fit based on lessons, fallback otherwise
  let startH, endH;
  if (dayLessons.length === 0) {
    startH = AGENDA_FALLBACK_START;
    endH = AGENDA_FALLBACK_END;
  } else {
    const minStart = Math.min(...dayLessons.map(x => x.startMin));
    const maxEnd = Math.max(...dayLessons.map(x => x.startMin + x.durMin));
    startH = Math.min(AGENDA_FALLBACK_START, Math.floor(minStart / 60));
    endH = Math.max(AGENDA_FALLBACK_END, Math.ceil(maxEnd / 60));
    // Safety clamps
    if (startH < 0) startH = 0;
    if (endH > 24) endH = 24;
  }

  const hourCount = endH - startH;
  const gridHeight = hourCount * AGENDA_PX_PER_HOUR;

  // Build hour rows (time gutter + empty slot column) — the grid backdrop.
  const grid = h('div', { className: 'agenda-grid', style: { height: gridHeight + 'px' } });
  for (let i = 0; i < hourCount; i++) {
    const hh = String(startH + i).padStart(2, '0');
    grid.appendChild(h('div', { className: 'agenda-row' },
      h('div', { className: 'agenda-hour' }, hh + ':00'),
      h('div', { className: 'agenda-slot' })
    ));
  }

  // Group lessons at the same (startMin, durMin, lessonType) into cohorts so
  // group lessons with several students show every name in a single block.
  const cohorts = buildCohorts(dayLessons, selectedDate);

  // Overlay: absolutely-positioned cohort blocks. Single-student and
  // multi-student lessons share the same layout — a compact header line
  // (time · type — count · €total) with member pills below.
  const overlay = h('div', { className: 'agenda-blocks', style: { height: gridHeight + 'px' } });
  cohorts.forEach(c => {
    const topPx = ((c.startMin - startH * 60) / 60) * AGENDA_PX_PER_HOUR;
    const heightPx = Math.max(28, (c.durMin / 60) * AGENDA_PX_PER_HOUR - 4);
    const startHm = formatHm(c.startMin);
    const endHm = formatHm(c.startMin + c.durMin);
    const typeShort = getLessonType(c.lessonType).short;
    const members = c.members;
    const cohortTotal = members.reduce((s, m) => s + Number(m.total || 0), 0);
    const isSingle = members.length === 1;
    const durH = Number(members[0].duration);

    // Fits every member as a full-width tappable row?
    const estimatedRowed = 22 + members.length * 26;
    const canListAll = heightPx >= estimatedRowed;
    const isCompact = !canListAll;

    // Header: "HH:MM–HH:MM · Type"        "Nh · €X"  (single)
    //         "HH:MM–HH:MM · Type"        "N · €X"   (group)
    const rightStr = (isSingle ? durH + 'h' : members.length) + ' · €' + cohortTotal.toFixed(2);
    const header = h('div', { className: 'agenda-block-header' },
      h('span', { className: 'agenda-block-time' }, startHm + '–' + endHm + ' · ' + typeShort),
      h('span', { className: 'agenda-block-count' }, rightStr)
    );

    // Compact-block tap target: single → edit lesson directly; multi → cohort
    // detail view (which then routes to per-student edit).
    const compactTap = isSingle
      ? () => navigate('editLesson', { _editLesson: members[0] })
      : () => navigate('cohort', { _cohortKey: cohortKey(c) });

    const block = h('div', {
      className: 'agenda-block' + (isCompact ? ' compact' : ''),
      style: { top: topPx + 'px', height: heightPx + 'px' },
      ...(isCompact ? { onclick: compactTap } : {})
    }, header);

    const memberList = h('div', { className: 'agenda-members' });
    if (canListAll) {
      // Full rows — every student tappable to edit their own record.
      members.forEach(m => {
        memberList.appendChild(h('button', {
          className: 'agenda-member',
          onclick: (e) => { e.stopPropagation(); navigate('editLesson', { _editLesson: m }); }
        },
          h('span', {}, getStudentName(m.studentId)),
          ...(isSingle ? [] : [h('span', { className: 'agenda-member-price' }, '€' + Number(m.total || 0).toFixed(2))])
        ));
      });
    } else {
      // Compact chips — tap anywhere on the block (single → edit, multi → cohort).
      members.forEach(m => {
        memberList.appendChild(h('span', { className: 'agenda-member' }, getStudentName(m.studentId)));
      });
    }
    block.appendChild(memberList);

    overlay.appendChild(block);
  });

  // Wrap grid + overlay in a positioning context
  const agendaWrap = h('div', { style: { position: 'relative' } }, grid, overlay);
  content.appendChild(agendaWrap);

  if (dayLessons.length === 0) {
    content.appendChild(h('p', {
      style: { textAlign: 'center', color: 'var(--muted)', fontSize: '13px', marginTop: '14px' }
    }, 'No lessons logged on this day'));
  }

  wrap.appendChild(content);
  return wrap;
}

// Cohort detail — fallback view for short/overflowing group blocks. Re-derives
// members from state.lessons each render so edits stay in sync.
function renderCohort() {
  const wrap = h('div');
  wrap.appendChild(renderHeader('Group lesson', () => navigate('review')));
  const content = h('div', { className: 'content' });

  const key = state._cohortKey;
  if (!key) {
    content.appendChild(h('div', { className: 'empty' },
      h('p', { className: 'empty-text' }, 'No group selected')));
    wrap.appendChild(content);
    return wrap;
  }

  const members = state.lessons.filter(l =>
    String(l.date).slice(0, 10) === key.date &&
    l.lessonType === key.lessonType &&
    parseTimeToMin(l.time) === key.startMin &&
    Math.max(15, Math.round(Number(l.duration) * 60)) === key.durMin
  );

  const startHm = formatHm(key.startMin);
  const endHm = formatHm(key.startMin + key.durMin);
  const typeShort = getLessonType(key.lessonType).short;
  const total = members.reduce((s, m) => s + Number(m.total || 0), 0);

  content.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text' },
      startHm + '–' + endHm + ' · ' + typeShort + ' · ' + members.length + (members.length === 1 ? ' student' : ' students') + ' · €' + total.toFixed(2))
  ));

  if (members.length === 0) {
    content.appendChild(h('p', {
      style: { textAlign: 'center', color: 'var(--muted)', fontSize: '13px' }
    }, 'This group no longer has any lessons — they may have been deleted.'));
    wrap.appendChild(content);
    return wrap;
  }

  content.appendChild(h('p', { className: 'section-label', style: { marginTop: '4px' } }, 'Students in this group'));
  members.forEach(m => {
    content.appendChild(h('div', {
      className: 'lesson-row', style: { cursor: 'pointer', padding: '10px 0' },
      onclick: () => navigate('editLesson', { _editLesson: m })
    },
      h('div', { className: 'lesson-info' },
        h('span', { className: 'lesson-student' }, getStudentName(m.studentId)),
        h('span', { className: 'lesson-meta' }, getParentName(m.parentId) + ' · ' + m.duration + 'h × €' + m.pricePerHour)
      ),
      h('span', { className: 'lesson-total' }, '€' + Number(m.total || 0).toFixed(2))
    ));
  });

  wrap.appendChild(content);
  return wrap;
}

function renderSettings() {
  const wrap = h('div');
  wrap.appendChild(renderHeader('Settings', () => navigate('home')));
  const content = h('div', { className: 'content' });

  content.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text', innerHTML: 'Paste the Google Apps Script Web App URL.<br>Find it in your Google Sheet → Extensions → Apps Script → Deploy.' })
  ));

  content.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'API URL'),
    h('input', { className: 'form-input', type: 'url', id: 'api-url', value: state.apiUrl, placeholder: 'https://script.google.com/macros/s/...' })
  ));

  content.appendChild(h('button', { className: 'btn-primary', onclick: async () => {
    const url = document.getElementById('api-url').value.trim();
    state.apiUrl = url;
    localStorage.setItem('ll_api_url', url);
    if (url) {
      showToast('Connecting...');
      await loadAll();
      if (state.parents.length > 0 || state.students.length > 0) {
        showToast('✓ Connected! ' + state.parents.length + ' parents loaded');
      }
    }
    navigate('home');
  }}, 'Connect'));

  if (state.apiUrl) {
    content.appendChild(h('button', { className: 'btn-secondary', style: { marginTop: '10px' }, onclick: async () => {
      showToast('Refreshing...');
      await loadAll();
      showToast('✓ Data refreshed');
    }}, 'Refresh data'));

    // ─── Standard lesson prices ─────────────────────────────────────────────
    content.appendChild(h('div', { style: { marginTop: '24px' } },
      h('h3', { style: { fontSize: '15px', margin: '0 0 4px 0' } }, 'Standard lesson prices'),
      h('p', { style: { fontSize: '12px', color: '#666', margin: '0 0 12px 0' } },
        'Default €/hour per lesson type. Per-student overrides (if any) take precedence.')
    ));

    LESSON_TYPES.forEach(t => {
      content.appendChild(h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, t.label + ' — ' + t.sub + ' (€/h)'),
        h('input', {
          className: 'form-input',
          type: 'number',
          inputmode: 'decimal',
          step: '0.01',
          min: '0',
          id: 'cfg-' + t.id,
          value: state.config[t.id] ?? DEFAULT_PRICES[t.id]
        })
      ));
    });

    content.appendChild(h('button', { className: 'btn-primary', style: { marginTop: '4px' }, onclick: async () => {
      const payload = {};
      let bad = false;
      LESSON_TYPES.forEach(t => {
        const raw = document.getElementById('cfg-' + t.id).value;
        const v = parseFloat(String(raw).replace(',', '.'));
        if (!isFinite(v) || v < 0) { bad = true; return; }
        payload['price_' + t.id] = v;
      });
      if (bad) { showToast('⚠️ Enter a valid non-negative number for every type'); return; }
      showToast('Saving prices...');
      const res = await api('POST', { action: 'updateConfig', config: payload });
      if (res && !res.error) {
        // Update local state so Home/Log screens pick up the change without a reload.
        LESSON_TYPES.forEach(t => { state.config[t.id] = payload['price_' + t.id]; });
        showToast('✓ Prices saved');
      } else {
        showToast('⚠️ ' + ((res && res.error) || 'Save failed'));
      }
    }}, 'Save prices'));
  }

  wrap.appendChild(content);
  return wrap;
}

function renderBottomNav() {
  const cls = (view) => 'nav-btn' + (state.view === view ? ' active' : '');
  return h('div', { className: 'bottom-nav' },
    h('button', { className: cls('parents'), onclick: () => navigate('parents') },
      h('span', { className: 'nav-icon' }, '👥'), h('span', { className: 'nav-label' }, 'Parents')),
    h('button', { className: cls('history'), onclick: () => navigate('history') },
      h('span', { className: 'nav-icon' }, '📋'), h('span', { className: 'nav-label' }, 'History')),
    h('button', { className: cls('review'), onclick: () => navigate('review') },
      h('span', { className: 'nav-icon' }, '🗓️'), h('span', { className: 'nav-label' }, 'Review'))
  );
}

// ─── Init ────────────────────────────────────────────────────────────────────

render();
if (state.apiUrl) loadAll();
</script>
</body>
</html>
