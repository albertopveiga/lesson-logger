<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lessons">
<meta name="theme-color" content="#2D6A4F">
<title>Lesson Logger</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F3;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --muted: #8B8B8B;
  --border: #E8E6E1;
  --accent: #2D6A4F;
  --accent-lt: #E9F5EE;
  --accent-dk: #1B4332;
  --warm: #F0EDE8;
  --danger: #C1453B;
  --danger-lt: #FFF0EF;
  --warning: #E8A84C;
  --warning-lt: #FFF8ED;
  --radius: 14px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor: pointer; -webkit-tap-highlight-color: transparent; }
input, textarea, select { font-family: var(--font); }

/* ─── Header ─── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: var(--card); position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 17px; font-weight: 700; }
.back-btn { background: none; border: none; font-size: 15px; color: var(--accent); font-weight: 600; padding: 4px 0; }
.add-btn { background: var(--accent-lt); border: none; font-size: 13px; color: var(--accent); padding: 6px 14px; border-radius: 20px; font-weight: 600; }

/* ─── Home ─── */
.home-header {
  padding: 24px 24px 14px; background: var(--card);
  border-bottom: 1px solid var(--border);
}
.home-header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; }
.home-header p { font-size: 14px; color: var(--muted); margin-top: 4px; }

/* ─── Summary ─── */
.summary {
  margin: 14px 20px 0; background: var(--accent-lt); border-radius: var(--radius);
  padding: 14px 18px; border: 1px solid rgba(45,106,79,0.12);
}
.summary-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.summary-grid { display: flex; justify-content: space-between; }
.summary-item { text-align: center; }
.summary-val { font-size: 20px; font-weight: 800; color: var(--accent); }
.summary-lbl { font-size: 11px; color: var(--accent); opacity: 0.75; margin-top: 1px; }

/* ─── Content ─── */
.content { padding: 12px 20px; }

/* ─── Student / Parent buttons ─── */
.item-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 7px;
  text-align: left; transition: border-color 0.15s;
}
.item-btn:active { border-color: var(--accent); }
.item-name { font-size: 15px; font-weight: 600; display: block; }
.item-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.item-arrow { font-size: 14px; color: var(--muted); }
.item-meta { display: flex; align-items: center; gap: 8px; }

/* ─── Lesson type grid ─── */
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.type-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 8px; background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); text-align: center; transition: all 0.15s;
}
.type-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.type-btn .label { font-size: 14px; font-weight: 700; }
.type-btn .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.type-btn.active .sub { color: rgba(255,255,255,0.7); }
.type-btn .price { font-size: 12px; font-weight: 600; color: var(--accent); margin-top: 5px; }
.type-btn.active .price { color: #fff; }

/* ─── Duration grid ─── */
.dur-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.dur-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 6px; background: var(--card); border: 2px solid var(--border);
  border-radius: 12px; transition: all 0.15s;
}
.dur-btn.active { background: var(--accent); border-color: var(--accent); }
.dur-btn .val { font-size: 20px; font-weight: 800; color: var(--accent); }
.dur-btn.active .val { color: #fff; }
.dur-btn .unit { font-size: 10px; color: var(--muted); }
.dur-btn.active .unit { color: rgba(255,255,255,0.7); }

/* ─── Price section ─── */
.price-box { margin-top: 18px; background: var(--warm); border-radius: var(--radius); padding: 14px; }
.price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.price-lbl { font-size: 13px; font-weight: 600; }
.price-input-wrap { display: flex; align-items: center; gap: 4px; }
.price-currency { font-size: 15px; font-weight: 700; color: var(--accent); }
.price-input {
  width: 65px; padding: 7px 8px; border-radius: 8px; border: 1px solid var(--border);
  font-size: 15px; text-align: right; outline: none; background: var(--card);
}
.reset-price { background: none; border: none; color: var(--accent); font-size: 11px; text-decoration: underline; padding: 0; margin-bottom: 6px; }
.total-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 8px; }
.total-lbl { font-size: 15px; font-weight: 700; }
.total-val { font-size: 20px; font-weight: 800; color: var(--accent); }

/* ─── Forms ─── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 5px; }
.form-input {
  width: 100%; padding: 11px 13px; border-radius: 12px; border: 1px solid var(--border);
  font-size: 15px; background: var(--card); outline: none;
}
.form-input:focus { border-color: var(--accent); }
textarea.form-input { resize: vertical; line-height: 1.5; }

/* ─── Section label ─── */
.section-label { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 9px; margin-top: 0; }
.section-divider { border-top: 2px solid var(--border); padding-top: 14px; margin-top: 8px; margin-bottom: 10px; }

/* ─── Buttons ─── */
.btn-primary {
  width: 100%; padding: 14px; border-radius: var(--radius); border: none;
  background: var(--accent); color: #fff; font-size: 15px; font-weight: 700;
}
.btn-primary:disabled { opacity: 0.4; }
.btn-secondary {
  width: 100%; padding: 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 13px; font-weight: 600;
}
.btn-delete {
  width: 100%; padding: 12px; border-radius: var(--radius); border: none;
  background: none; color: var(--danger); font-size: 13px; font-weight: 600; margin-top: 12px;
}
.btn-import {
  display: flex; align-items: center; gap: 10px; width: 100%;
  background: var(--warm); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px 16px; margin-bottom: 10px; font-size: 14px; font-weight: 600;
}

/* ─── Add student inline ─── */
.add-student-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.add-student-row input { flex: 1; }
.add-student-btn {
  padding: 11px 16px; border-radius: 12px; border: none;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; white-space: nowrap;
}

/* ─── Override rows ─── */
.override-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.override-label { font-size: 13px; font-weight: 600; }
.override-input {
  width: 60px; padding: 7px 8px; border-radius: 8px; border: 1px solid var(--border);
  font-size: 14px; text-align: right; outline: none; background: var(--card);
}

/* ─── History ─── */
.month-block { margin-bottom: 24px; }
.month-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 2px solid var(--text); }
.month-label { font-size: 16px; font-weight: 800; }
.month-total { font-size: 15px; font-weight: 700; color: var(--accent); }
.hist-parent { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 11px 13px; margin-top: 8px; }
.hist-parent-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
.hist-parent-name { font-size: 14px; font-weight: 700; }
.hist-parent-total { font-size: 13px; font-weight: 700; color: var(--accent); }
.lesson-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-top: 1px solid var(--border); }
.lesson-info { flex: 1; }
.lesson-student { font-size: 13px; font-weight: 600; display: block; }
.lesson-meta { font-size: 10px; color: var(--muted); }
.lesson-total { font-size: 13px; font-weight: 700; color: var(--accent); min-width: 50px; text-align: right; }
.lesson-del { background: none; border: none; color: var(--danger); font-size: 16px; padding: 2px 4px; }

/* ─── Agenda (day-planner review) ─── */
.agenda-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.agenda-nav button { flex: 0 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 16px; font-weight: 700; color: var(--accent); }
.agenda-nav button:active { background: var(--accent-lt); }
.agenda-date { flex: 1; text-align: center; font-size: 15px; font-weight: 700; }
.agenda-summary { background: var(--accent-lt); border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; display: flex; justify-content: space-between; font-size: 13px; color: var(--accent); font-weight: 600; }
.agenda-grid { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.agenda-row { display: flex; height: 60px; border-top: 1px solid var(--border); }
.agenda-row:first-child { border-top: none; }
.agenda-hour { flex: 0 0 52px; padding: 4px 8px 0 10px; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.02em; border-right: 1px solid var(--border); }
.agenda-slot { flex: 1; position: relative; }
.agenda-blocks { position: absolute; left: 52px; right: 0; top: 0; bottom: 0; pointer-events: none; }
.agenda-block {
  position: absolute; left: 6px; right: 6px;
  background: var(--accent); color: #fff; border-radius: 10px;
  padding: 6px 10px; overflow: hidden; pointer-events: auto; cursor: pointer;
  box-shadow: 0 1px 3px rgba(27,67,50,0.15);
  display: flex; flex-direction: column; justify-content: center;
}
.agenda-block:active { background: var(--accent-dk); }
.agenda-block-time { font-size: 10px; font-weight: 700; opacity: 0.85; letter-spacing: 0.02em; }
.agenda-block-name { font-size: 13px; font-weight: 700; line-height: 1.2; margin-top: 1px; }
.agenda-block-meta { font-size: 11px; opacity: 0.9; margin-top: 1px; }
.agenda-block-price { font-size: 11px; font-weight: 700; margin-top: auto; align-self: flex-end; }
.agenda-block.compact { padding: 3px 8px; }
.agenda-block.compact .agenda-block-name { font-size: 12px; }
.agenda-block.compact .agenda-block-meta { display: none; }
.agenda-block.compact .agenda-block-price { display: none; }

/* ─── Info / Warning ─── */
.info-box { background: var(--accent-lt); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; border: 1px solid rgba(45,106,79,0.12); }
.info-text { font-size: 13px; line-height: 1.4; color: var(--accent); }
.warning-box { background: var(--warning-lt); border: 1px solid rgba(232,168,76,0.25); border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; font-size: 12px; color: #8B6914; }

/* ─── Preview ─── */
.preview-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; margin-top: 10px; }
.preview-header { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
.preview-row { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--border); font-size: 13px; }

/* ─── Empty state ─── */
.empty { text-align: center; padding: 40px 20px; }
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty-text { font-size: 15px; color: var(--muted); margin-bottom: 18px; }

/* ─── Bottom nav ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; display: flex; justify-content: space-around;
  background: var(--card); border-top: 1px solid var(--border);
  padding: 7px 0 env(safe-area-inset-bottom, 7px); z-index: 20;
}
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 1px; background: none; border: none; padding: 5px 14px; }
.nav-icon { font-size: 18px; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--muted); }

/* ─── Toast ─── */
.toast {
  position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff; padding: 10px 22px; border-radius: 26px;
  font-size: 14px; font-weight: 600; z-index: 100; box-shadow: 0 4px 18px rgba(0,0,0,0.14);
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ─── Settings ─── */
.settings-btn {
  position: absolute; right: 20px; top: 26px; background: none; border: none;
  font-size: 20px; color: var(--muted); padding: 4px;
}

/* ─── Loading ─── */
.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; color: var(--muted); font-size: 15px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Search */
.search-input {
  width: 100%; padding: 10px 13px; border-radius: 12px; border: 1px solid var(--border);
  font-size: 14px; background: var(--card); outline: none; margin-bottom: 10px;
}
.search-input:focus { border-color: var(--accent); }

.hidden { display: none; }
</style>
</head>
<body>

<div id="app"></div>
<div style="text-align:center; padding:16px 20px 24px; font-size:11px; color:var(--muted); letter-spacing:0.03em;">
  v2026-04-18 22:00 UTC
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────

const LESSON_TYPES = [
  { id: 'ind_pres', label: 'Individual', sub: 'Presencial', short: 'Ind · Pres' },
  { id: 'ind_online', label: 'Individual', sub: 'Online', short: 'Ind · Online' },
  { id: 'grp_pres', label: 'Group', sub: 'Presencial', short: 'Group · Pres' },
  { id: 'grp_online', label: 'Group', sub: 'Online', short: 'Group · Online' },
];

const DEFAULT_PRICES = { ind_pres: 30, ind_online: 25, grp_pres: 20, grp_online: 15 };

// ─── State ───────────────────────────────────────────────────────────────────

let state = {
  view: 'home',
  apiUrl: localStorage.getItem('ll_api_url') || '',
  parents: [],
  students: [],
  lessons: [],
  config: { ...DEFAULT_PRICES },
  loading: false,
  toast: null,
  // Selection
  selStudent: null,
  selParent: null,
  searchQuery: '',
};

// ─── API ─────────────────────────────────────────────────────────────────────

async function api(method, body) {
  if (!state.apiUrl) { showToast('⚠️ Set API URL in Settings'); return null; }
  try {
    // Google Apps Script CORS workaround:
    // ALL requests go through POST with text/plain to avoid CORS preflight.
    // GET requests are converted to POST with an action parameter.
    const r = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
      redirect: 'follow',
    });
    return await r.json();
  } catch (e) {
    console.error('API error:', e);
    showToast('⚠️ Connection error — check console');
    return null;
  }
}

async function loadAll() {
  state.loading = true;
  render();
  const data = await api('POST', { action: 'getAll' });
  if (data && !data.error) {
    state.parents = data.parents || [];
    state.students = data.students || [];
    state.lessons = (data.lessons || []).map(l => {
      const dur = parseFloat(String(l.duration).replace(',', '.')) || 0;
      const pph = parseFloat(String(l.pricePerHour).replace(',', '.')) || 0;
      const tot = parseFloat(String(l.total).replace(',', '.')) || 0;
      if (dur === 0 && l.duration) console.log('Duration parse issue:', l.duration, typeof l.duration);
      return { ...l, duration: dur, pricePerHour: pph, total: tot };
    });
    if (data.config) {
      state.config = {
        ind_pres: Number(data.config.price_ind_pres) || DEFAULT_PRICES.ind_pres,
        ind_online: Number(data.config.price_ind_online) || DEFAULT_PRICES.ind_online,
        grp_pres: Number(data.config.price_grp_pres) || DEFAULT_PRICES.grp_pres,
        grp_online: Number(data.config.price_grp_online) || DEFAULT_PRICES.grp_online,
      };
    }
  } else if (data?.error) {
    showToast('⚠️ ' + data.error);
  }
  state.loading = false;
  render();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────

function getPrice(student, typeId) {
  if (student?.priceOverrides?.[typeId] != null) return student.priceOverrides[typeId];
  return state.config[typeId] ?? DEFAULT_PRICES[typeId];
}

function getParentName(parentId) {
  const p = state.parents.find(p => p.id === parentId);
  return p ? p.name : '(unknown parent)';
}

function getStudentName(studentId) {
  const s = state.students.find(s => s.id === studentId);
  return s ? s.name : '(unknown student)';
}

function getLessonType(id) { return LESSON_TYPES.find(t => t.id === id) || LESSON_TYPES[0]; }
function getCurrentMonth() { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; }
function getMonthLabel(ds) {
  var parts = String(ds).split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, 1);
  return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
}
function formatDate(ds) {
  var s = String(ds).slice(0, 10);
  // Parse YYYY-MM-DD manually to avoid timezone issues
  var parts = s.split('-');
  if (parts.length === 3) {
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    return d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' });
  }
  return s;
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

// ─── Time picker (24h, 15-min steps, mobile-friendly) ───────────────────────
// Two native <select>s — native selects open OS pickers on phones, and always
// render as 24h regardless of the user's locale.
function timePicker(idPrefix, value) {
  var v = String(value || '09:00');
  var parts = v.split(':');
  var hh = parts[0] ? parts[0].padStart(2,'0') : '09';
  var mmRaw = parts[1] ? parseInt(parts[1], 10) : 0;
  // Snap to nearest 15-minute slot
  var snap = Math.round(mmRaw / 15) * 15;
  if (snap === 60) { snap = 0; hh = String((parseInt(hh,10) + 1) % 24).padStart(2,'0'); }
  var mm = String(snap).padStart(2,'0');

  var hourOpts = [];
  for (var i = 0; i < 24; i++) {
    var s = String(i).padStart(2, '0');
    hourOpts.push(h('option', { value: s, ...(s === hh ? { selected: 'selected' } : {}) }, s));
  }
  var minOpts = ['00','15','30','45'].map(function(s) {
    return h('option', { value: s, ...(s === mm ? { selected: 'selected' } : {}) }, s);
  });

  var hourSel = h('select', { className: 'form-input', id: idPrefix + '-hh', style: { flex: '1', textAlign: 'center' } }, ...hourOpts);
  var minSel = h('select', { className: 'form-input', id: idPrefix + '-mm', style: { flex: '1', textAlign: 'center' } }, ...minOpts);
  var colon = h('span', { style: { fontSize: '18px', color: 'var(--muted)', alignSelf: 'center' } }, ':');

  return h('div', { style: { display: 'flex', gap: '6px', alignItems: 'stretch' } }, hourSel, colon, minSel);
}

function readTimeValue(idPrefix) {
  var hh = document.getElementById(idPrefix + '-hh');
  var mm = document.getElementById(idPrefix + '-mm');
  if (!hh || !mm) return '';
  return hh.value + ':' + mm.value;
}

function navigate(view, extra = {}) {
  state.view = view;
  state.searchQuery = '';
  Object.assign(state, extra);
  render();
  window.scrollTo(0, 0);
}

// ─── Render engine ───────────────────────────────────────────────────────────

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'onclick' || k === 'onchange' || k === 'oninput') el[k] = v;
    else if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const views = {
    home: renderHome,
    log: renderLog,
    editLesson: renderEditLesson,
    parents: renderParents,
    editParent: renderEditParent,
    editStudent: renderEditStudent,
    pricing: renderPricing,
    history: renderHistory,
    review: renderReview,
    settings: renderSettings,
  };

  const fn = views[state.view] || renderHome;
  app.appendChild(fn());

  if (state.view === 'home') app.appendChild(renderBottomNav());
  if (state.toast) app.appendChild(h('div', { className: 'toast' }, state.toast));
}

  if (!state.apiUrl) {

        h('div', { className: 'empty-icon' }, '🔗'),

        h('button', { className: 'btn-primary', onclick: () => navigate('settings') }, 'Open Settings')

    ));

  }

  if (state.loading) {
    wrap.appendChild(h('div', { className: 'loading' }, h('div', { className: 'spinner' }), 'Loading...'));
    return wrap;
  }

  // Summary
  const cm = getCurrentMonth();
  const ml = state.lessons.filter(l => String(l.date).startsWith(cm));
  if (ml.length > 0) {
    const totalH = ml.reduce((s,l) => s + Number(l.duration), 0);

    const uniq = new Set(ml.map(l => l.studentId)).size;
    wrap.appendChild(h('div', { className: 'summary' },
      h('div', { className: 'summary-title' }, 'This month'),
      h('div', { className: 'summary-grid' },

      )
    ));

  // what's already been logged and don't double-enter a lesson.
  const nowDate = new Date();
  const today = nowDate.getFullYear() + '-' + String(nowDate.getMonth()+1).padStart(2,'0') + '-' + String(nowDate.getDate()).padStart(2,'0');
  const todayL = state.lessons.filter(l => String(l.date).startsWith(today));

        h('span', { className: 'hist-parent-total' }, String(todayL.length) + ' lesson' + (todayL.length !== 1 ? 's' : ''))
      )
    );
    todayL.slice().sort((a,b) => String(a.time || '').localeCompare(String(b.time || ''))).forEach(l => {

      ));

      id: 'home-search',

        const q = e.target.value.toLowerCase();
        document.querySelectorAll('.student-item').forEach(el => {

function updateLogUI() {
  const durSec = document.getElementById('dur-section');
  const priceSec = document.getElementById('price-section');
  if (!durSec || !priceSec) return;

  if (state._selType) durSec.classList.remove('hidden');
  else { durSec.classList.add('hidden'); priceSec.classList.add('hidden'); return; }

  if (!state._selDur) { priceSec.classList.add('hidden'); return; }
  priceSec.classList.remove('hidden');

  // Only rebuild when the type/duration context changes. Rebuilding on every
  // price-input keystroke destroys the input and kills focus on mobile — iOS
  // dismisses the keyboard between keystrokes, making the field unusable.
  const key = state._selType + '|' + state._selDur;
  if (priceSec.dataset.builtKey !== key) {
    priceSec.dataset.builtKey = key;
    priceSec.innerHTML = '';
    priceSec.appendChild(buildLogPriceBox());
    // Scroll the section into view so the Log button is visible without
    // manual scrolling after picking a duration.
    if (priceSec.scrollIntoView) priceSec.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  updateLogTotals();
}

function buildLogPriceBox() {
  const st = state.selStudent;
  const stdPrice = getPrice(st, state._selType);
  const initial = state._customPrice != null ? state._customPrice : stdPrice;

  const priceInput = h('input', {
    className: 'price-input', type: 'number', inputmode: 'decimal',
    min: '0', step: '0.5', value: String(initial),
    oninput: (e) => {
      state._customPrice = e.target.value === '' ? null : parseFloat(e.target.value);
      updateLogTotals();
    }
  });

  const resetBtn = h('button', {
    className: 'reset-price', style: { display: 'none' },
    onclick: () => {
      state._customPrice = null;
      priceInput.value = String(stdPrice);
      updateLogTotals();
    }
  }, 'Reset to standard (€' + stdPrice + ')');

  return h('div', { className: 'price-box' },
    h('div', { className: 'price-row' },
      h('span', { className: 'price-lbl' }, 'Price per hour'),
      h('div', { className: 'price-input-wrap' },
        h('span', { className: 'price-currency' }, '€'),
        priceInput
      )
    ),
    resetBtn,
    h('div', { className: 'total-row' },
      h('span', { className: 'total-lbl' }, 'Total'),
      h('span', { className: 'total-val' }, '€0.00')
    ),
    h('button', {
      className: 'btn-primary', style: { marginTop: '14px' },
      onclick: async () => {
        const st2 = state.selStudent;
        if (!st2 || !state._selType || state._selDur == null) return;
        const date = document.getElementById('log-date').value;
        const time = readTimeValue('log-time');
        const selType = state._selType;
        const selDur = state._selDur;
        // Read price at click-time — the stored _customPrice may have changed
        // since the box was built (the box is now built once per type/dur combo).
        const stdP = getPrice(st2, selType);
        const price = state._customPrice != null ? state._customPrice : stdP;
        const lessonTotal = selDur * price;
        const tempId = 'tmp_' + Math.random().toString(36).slice(2, 8);
        const lessonData = {
          id: tempId, studentId: st2.id, parentId: st2.parentId,
          date, time, lessonType: selType, duration: selDur,
          pricePerHour: price, total: lessonTotal
        };
        // Optimistic: show immediately
        state.lessons.push(lessonData);
        showToast('✓ ' + selDur + 'h for ' + st2.name);
        navigate('home');
        // Save in background with captured values
        const r = await api('POST', {
          action: 'addLesson', studentId: st2.id, parentId: st2.parentId,
          date, time, lessonType: selType, duration: selDur,
          pricePerHour: price, total: lessonTotal
        });
        if (r?.success) {
          const idx = state.lessons.findIndex(l => l.id === tempId);
          if (idx >= 0) state.lessons[idx].id = r.id;
        } else {
          state.lessons = state.lessons.filter(l => l.id !== tempId);
          showToast('⚠️ Failed to save lesson');
          render();
        }
      }
    }, 'Log lesson')
  );
}

function updateLogTotals() {
  const priceSec = document.getElementById('price-section');
  if (!priceSec) return;
  const st = state.selStudent;
  if (!st || !state._selType || state._selDur == null) return;
  const stdPrice = getPrice(st, state._selType);
  const displayPrice = state._customPrice != null ? state._customPrice : stdPrice;
  const totalEl = priceSec.querySelector('.total-val');
  if (totalEl) totalEl.textContent = '€' + (state._selDur * displayPrice).toFixed(2);
  const resetBtn = priceSec.querySelector('.reset-price');
  if (resetBtn) {
    const show = state._customPrice != null && state._customPrice !== stdPrice;
    resetBtn.style.display = show ? '' : 'none';
  }
}

      }
    },

      oninput: (e) => {
        state._editPrice = parseFloat(e.target.value) || 0;
        updateEditTotal();
      }
    })

  // Total display
  const totalBox = h('div', { className: 'price-box', id: 'edit-total-box' },
    h('div', { className: 'total-row' },

    const date = document.getElementById('edit-date').value;
    const time = readTimeValue('edit-time');
    const lessonType = state._editType;
    const duration = state._editDur;
    const pricePerHour = state._editPrice;

      action: 'updateLesson', id: l.id,

      showToast('✓ Deleted');
      navigate('history');
    }
  }}, 'Delete lesson'));

  wrap.appendChild(content);
  return wrap;
}

function updateEditTotal() {

    h('p', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '6px' } },
      '📄 Name comes from Facturas — edit it there if it\'s wrong.')
  ));

  content.appendChild(h('p', { className: 'section-label', style: { marginTop: '14px' } }, 'Price overrides (blank = standard)'));
  LESSON_TYPES.forEach(t => {
    const hasOverride = student.priceOverrides?.[t.id] != null;
    content.appendChild(h('div', { className: 'override-row' },
      h('span', { className: 'override-label' }, t.short),
      h('div', { className: 'price-input-wrap' },
        h('span', { className: 'price-currency' }, '€'),
        h('input', {
          className: 'override-input', type: 'number', id: 'ov-' + t.id,
          value: hasOverride ? String(student.priceOverrides[t.id]) : '',
          placeholder: String(state.config[t.id])
        })
      )
    ));
  });

  content.appendChild(h('button', { className: 'btn-primary', style: { marginTop: '18px' }, onclick: async () => {
    const ov = {};
    LESSON_TYPES.forEach(t => {
      const v = document.getElementById('ov-' + t.id).value;
      if (v !== '') ov[t.id] = parseFloat(v);
    });
    const r = await api('POST', { action: 'updateStudent', id: student.id, priceOverrides: ov });
    if (r?.success) {
      const idx = state.students.findIndex(s => s.id === student.id);
      if (idx >= 0) state.students[idx] = { ...student, priceOverrides: ov };
      showToast('✓ Saved');
      navigate('editParent', { selParent: parent });
    } else if (r?.error) {
      showToast('⚠️ ' + r.error);
    }
  }}, 'Save overrides'));

  wrap.appendChild(content);
  return wrap;
}

function renderHistory() {
  const wrap = h('div');
  wrap.appendChild(renderHeader('History', () => navigate('home')));

  if (state.lessons.length === 0) {
    wrap.appendChild(h('div', { className: 'empty' }, h('div', { className: 'empty-icon' }, '📋'), h('p', { className: 'empty-text' }, 'No lessons logged yet')));
    return wrap;
  }

  const content = h('div', { className: 'content' });

  // Collect available months
  const allMonths = [...new Set(state.lessons.map(l => String(l.date).slice(0, 7)))].sort((a,b) => b.localeCompare(a));
  const selectedMonth = state._histMonth || 'all';

  // Month filter
  const select = h('select', {
    className: 'form-input', style: { marginBottom: '14px' },
    onchange: (e) => { state._histMonth = e.target.value; render(); }
  },
    h('option', { value: 'all' }, 'All months'),
    ...allMonths.map(m => {
      const opt = h('option', { value: m }, getMonthLabel(m));
      if (m === selectedMonth) opt.selected = true;
      return opt;
    })
  );
  content.appendChild(select);

  const filteredLessons = selectedMonth === 'all' ? state.lessons : state.lessons.filter(l => String(l.date).startsWith(selectedMonth));

  const grouped = {};
  filteredLessons.forEach(l => {
    const m = String(l.date).slice(0, 7);
    if (!grouped[m]) grouped[m] = [];
    grouped[m].push(l);
  });

  const cm = getCurrentMonth();
  Object.entries(grouped).sort((a,b) => b[0].localeCompare(a[0])).forEach(([month, lessons]) => {
    const byParent = {};
    lessons.forEach(l => {
      const pid = l.parentId || 'x';
      if (!byParent[pid]) byParent[pid] = { name: getParentName(pid), lessons: [] };
      byParent[pid].lessons.push(l);
    });
    const mTotal = lessons.reduce((s,l) => s + Number(l.total), 0);

    const block = h('div', { className: 'month-block' },
      h('div', { className: 'month-header' },
        h('span', { className: 'month-label' }, getMonthLabel(month)),
        h('span', { className: 'month-total' }, '€' + mTotal.toFixed(2))
      )
    );

    Object.entries(byParent).forEach(([pid, pData]) => {
      const pTotal = pData.lessons.reduce((s,l) => s + Number(l.total), 0);
      const pBlock = h('div', { className: 'hist-parent' },
        h('div', { className: 'hist-parent-header' },
          h('span', { className: 'hist-parent-name' }, pData.name),
          h('span', { className: 'hist-parent-total' }, '€' + pTotal.toFixed(2))
        )
      );
      pData.lessons.sort((a,b) => String(a.date).localeCompare(String(b.date)) || String(a.time||'').localeCompare(String(b.time||''))).forEach(l => {
        const timeStr = l.time ? ' ' + l.time : '';
        const row = h('div', { className: 'lesson-row', style: { cursor: month >= cm ? 'pointer' : 'default' } },
          h('div', { className: 'lesson-info', onclick: () => {
            if (month >= cm) navigate('editLesson', { _editLesson: l });
          }},
            h('span', { className: 'lesson-student' }, getStudentName(l.studentId) + '  ·  ' + formatDate(l.date) + timeStr),
            h('span', { className: 'lesson-meta' }, getLessonType(l.lessonType).short + ' · ' + l.duration + 'h × €' + l.pricePerHour)
          ),
          h('span', { className: 'lesson-total' }, '€' + Number(l.total).toFixed(2))
        );
        if (month >= cm) {
          row.appendChild(h('button', { className: 'lesson-del', onclick: async (e) => {
            e.stopPropagation();
            if (!confirm('Delete?')) return;
            const r = await api('POST', { action: 'deleteLesson', id: l.id });
            if (r?.success) { state.lessons = state.lessons.filter(x => x.id !== l.id); render(); }
          }}, '×'));
        }
        pBlock.appendChild(row);
      });
      block.appendChild(pBlock);
    });
    content.appendChild(block);
  });

  wrap.appendChild(content);
  return wrap;
}

// ─── Review (daily-planner agenda view) ────────────────────────────────────
// Day at a time, auto-fit hour range (08:00–20:00 fallback), lessons rendered
// as absolutely-positioned blocks with height proportional to duration.
// Tap a block to edit. Empty slots are inert.
const AGENDA_PX_PER_HOUR = 60;
const AGENDA_FALLBACK_START = 8;   // 08:00
const AGENDA_FALLBACK_END = 20;    // 20:00 (exclusive, so rows 08–19 are drawn)

function parseTimeToMin(t) {
  if (!t) return null;
  var parts = String(t).split(':');
  if (parts.length < 2) return null;
  var hh = parseInt(parts[0], 10);
  var mm = parseInt(parts[1], 10);
  if (isNaN(hh) || isNaN(mm)) return null;
  return hh * 60 + mm;
}

function addDaysYMD(ymd, delta) {
  var p = String(ymd).split('-');
  var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
  d.setDate(d.getDate() + delta);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function renderReview() {
  const wrap = h('div');
  wrap.appendChild(renderHeader('Review', () => navigate('home')));

  const content = h('div', { className: 'content' });

  // Day picker — default to today (or the last recorded day if today is empty and no prior selection)
  const now = new Date();
  const todayYmd = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const selectedDate = state._reviewDate || todayYmd;

  // Day navigator
  const nav = h('div', { className: 'agenda-nav' },
    h('button', { onclick: () => { state._reviewDate = addDaysYMD(selectedDate, -1); render(); } }, '‹'),
    h('input', {
      className: 'form-input', type: 'date', value: selectedDate,
      style: { flex: '1', textAlign: 'center', fontWeight: '700' },
      onchange: (e) => { state._reviewDate = e.target.value || todayYmd; render(); }
    }),
    h('button', { onclick: () => { state._reviewDate = addDaysYMD(selectedDate, 1); render(); } }, '›'),
    h('button', {
      onclick: () => { state._reviewDate = todayYmd; render(); },
      style: { fontSize: '12px', padding: '8px 10px' }
    }, 'Today')
  );
  content.appendChild(nav);

  // Day's lessons
  const dayLessons = state.lessons
    .filter(l => String(l.date).slice(0, 10) === selectedDate)
    .map(l => {
      const startMin = parseTimeToMin(l.time);
      const durMin = Math.max(15, Math.round(Number(l.duration) * 60));
      return { l, startMin: startMin == null ? 9 * 60 : startMin, durMin };
    })
    .sort((a, b) => a.startMin - b.startMin);

  // Summary row
  const dayTotal = dayLessons.reduce((s, x) => s + Number(x.l.total || 0), 0);
  const dayHours = dayLessons.reduce((s, x) => s + Number(x.l.duration || 0), 0);
  content.appendChild(h('div', { className: 'agenda-summary' },
    h('span', {}, dayLessons.length + (dayLessons.length === 1 ? ' lesson' : ' lessons') + ' · ' + dayHours + 'h'),
    h('span', {}, '€' + dayTotal.toFixed(2))
  ));

  // Determine hour range — auto-fit based on lessons, fallback otherwise
  let startH, endH;
  if (dayLessons.length === 0) {
    startH = AGENDA_FALLBACK_START;
    endH = AGENDA_FALLBACK_END;
  } else {
    const minStart = Math.min(...dayLessons.map(x => x.startMin));
    const maxEnd = Math.max(...dayLessons.map(x => x.startMin + x.durMin));
    startH = Math.min(AGENDA_FALLBACK_START, Math.floor(minStart / 60));
    endH = Math.max(AGENDA_FALLBACK_END, Math.ceil(maxEnd / 60));
    // Safety clamps
    if (startH < 0) startH = 0;
    if (endH > 24) endH = 24;
  }

  const hourCount = endH - startH;
  const gridHeight = hourCount * AGENDA_PX_PER_HOUR;

  // Build hour rows (time gutter + empty slot column) — the grid backdrop.
  const grid = h('div', { className: 'agenda-grid', style: { height: gridHeight + 'px' } });
  for (let i = 0; i < hourCount; i++) {
    const hh = String(startH + i).padStart(2, '0');
    grid.appendChild(h('div', { className: 'agenda-row' },
      h('div', { className: 'agenda-hour' }, hh + ':00'),
      h('div', { className: 'agenda-slot' })
    ));
  }

  // Overlay: absolutely-positioned lesson blocks
  const overlay = h('div', { className: 'agenda-blocks', style: { height: gridHeight + 'px' } });
  dayLessons.forEach(({ l, startMin, durMin }) => {
    const topPx = ((startMin - startH * 60) / 60) * AGENDA_PX_PER_HOUR;
    const heightPx = Math.max(28, (durMin / 60) * AGENDA_PX_PER_HOUR - 4); // -4 for vertical breathing room
    const isCompact = heightPx < 52;

    const startHm = String(Math.floor(startMin / 60)).padStart(2, '0') + ':' + String(startMin % 60).padStart(2, '0');
    const endTotal = startMin + durMin;
    const endHm = String(Math.floor(endTotal / 60) % 24).padStart(2, '0') + ':' + String(endTotal % 60).padStart(2, '0');

    const studentName = getStudentName(l.studentId);
    const typeShort = getLessonType(l.lessonType).short;
    const priceStr = '€' + Number(l.total || 0).toFixed(2);

    const block = h('div', {
      className: 'agenda-block' + (isCompact ? ' compact' : ''),
      style: { top: topPx + 'px', height: heightPx + 'px' },
      onclick: () => navigate('editLesson', { _editLesson: l })
    },
      h('div', { className: 'agenda-block-time' }, startHm + '–' + endHm),
      h('div', { className: 'agenda-block-name' }, studentName),
      h('div', { className: 'agenda-block-meta' }, typeShort + ' · ' + l.duration + 'h'),
      h('div', { className: 'agenda-block-price' }, priceStr)
    );
    overlay.appendChild(block);
  });

  // Wrap grid + overlay in a positioning context
  const agendaWrap = h('div', { style: { position: 'relative' } }, grid, overlay);
  content.appendChild(agendaWrap);

  if (dayLessons.length === 0) {
    content.appendChild(h('p', {
      style: { textAlign: 'center', color: 'var(--muted)', fontSize: '13px', marginTop: '14px' }
    }, 'No lessons logged on this day'));
  }

  wrap.appendChild(content);
  return wrap;
}

function renderSettings() {
  const wrap = h('div');
  wrap.appendChild(renderHeader('Settings', () => navigate('home')));
  const content = h('div', { className: 'content' });

  content.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text', innerHTML: 'Paste the Google Apps Script Web App URL.<br>Find it in your Google Sheet → Extensions → Apps Script → Deploy.' })
  ));

  content.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'API URL'),
    h('input', { className: 'form-input', type: 'url', id: 'api-url', value: state.apiUrl, placeholder: 'https://script.google.com/macros/s/...' })
  ));

  content.appendChild(h('button', { className: 'btn-primary', onclick: async () => {
    const url = document.getElementById('api-url').value.trim();
    state.apiUrl = url;
    localStorage.setItem('ll_api_url', url);
    if (url) {
      showToast('Connecting...');
      await loadAll();
      if (state.parents.length > 0 || state.students.length > 0) {
        showToast('✓ Connected! ' + state.parents.length + ' parents loaded');
      }
    }
    navigate('home');
  }}, 'Connect'));

  if (state.apiUrl) {
    content.appendChild(h('button', { className: 'btn-secondary', style: { marginTop: '10px' }, onclick: async () => {
      showToast('Refreshing...');
      await loadAll();
      showToast('✓ Data refreshed');
    }}, 'Refresh data'));

    // ─── Standard lesson prices ─────────────────────────────────────────────
    content.appendChild(h('div', { style: { marginTop: '24px' } },
      h('h3', { style: { fontSize: '15px', margin: '0 0 4px 0' } }, 'Standard lesson prices'),
      h('p', { style: { fontSize: '12px', color: '#666', margin: '0 0 12px 0' } },
        'Default €/hour per lesson type. Per-student overrides (if any) take precedence.')
    ));

    LESSON_TYPES.forEach(t => {
      content.appendChild(h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, t.label + ' — ' + t.sub + ' (€/h)'),
        h('input', {
          className: 'form-input',
          type: 'number',
          inputmode: 'decimal',
          step: '0.01',
          min: '0',
          id: 'cfg-' + t.id,
          value: state.config[t.id] ?? DEFAULT_PRICES[t.id]
        })
      ));
    });

    content.appendChild(h('button', { className: 'btn-primary', style: { marginTop: '4px' }, onclick: async () => {
      const payload = {};
      let bad = false;
      LESSON_TYPES.forEach(t => {
        const raw = document.getElementById('cfg-' + t.id).value;
        const v = parseFloat(String(raw).replace(',', '.'));
        if (!isFinite(v) || v < 0) { bad = true; return; }
        payload['price_' + t.id] = v;
      });
      if (bad) { showToast('⚠️ Enter a valid non-negative number for every type'); return; }
      showToast('Saving prices...');
      const res = await api('POST', { action: 'updateConfig', config: payload });
      if (res && !res.error) {
        // Update local state so Home/Log screens pick up the change without a reload.
        LESSON_TYPES.forEach(t => { state.config[t.id] = payload['price_' + t.id]; });
        showToast('✓ Prices saved');
      } else {
        showToast('⚠️ ' + ((res && res.error) || 'Save failed'));
      }
    }}, 'Save prices'));
  }

  wrap.appendChild(content);
  return wrap;
}

function renderBottomNav() {
  return h('div', { className: 'bottom-nav' },
    h('button', { className: 'nav-btn', onclick: () => navigate('parents') },
      h('span', { className: 'nav-icon' }, '👥'), h('span', { className: 'nav-label' }, 'Parents')),
    h('button', { className: 'nav-btn', onclick: () => navigate('history') },
      h('span', { className: 'nav-icon' }, '📋'), h('span', { className: 'nav-label' }, 'History')),
    h('button', { className: 'nav-btn', onclick: () => navigate('review') },
      h('span', { className: 'nav-icon' }, '🗓️'), h('span', { className: 'nav-label' }, 'Review'))
  );
}

// ─── Init ────────────────────────────────────────────────────────────────────

render();
if (state.apiUrl) loadAll();
</script>
