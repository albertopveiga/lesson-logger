<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>Invoice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F3EF; --card: #FFFFFF; --text: #1A1A1A; --muted: #8B8B8B;
  --border: #E2DFD9; --accent: #8B5E3C; --accent-lt: #F5EDE6;
  --warm: #EDE8E1; --danger: #C1453B; --danger-lt: #FFF0EF;
  --success: #2D6A4F; --success-lt: #E9F5EE;
  --radius: 14px; --font: 'DM Sans', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); max-width: 600px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; -webkit-tap-highlight-color: transparent; }
input, textarea { font-family: var(--font); }

.header { display: flex; align-items: center; justify-content: center; padding: 18px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
.header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); }
.content { padding: 16px 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 5px; }
.form-input { width: 100%; padding: 11px 13px; border-radius: 12px; border: 1px solid var(--border); font-size: 15px; background: var(--card); outline: none; }
.form-input:focus { border-color: var(--accent); }
textarea.form-input { resize: vertical; line-height: 1.5; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; }

.btn-primary { width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary { width: 100%; padding: 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; font-weight: 600; }
.btn-danger { width: 100%; padding: 12px; border-radius: var(--radius); border: none; background: var(--danger); color: #fff; font-size: 14px; font-weight: 700; }

.info-box { background: var(--accent-lt); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; border: 1px solid rgba(139,94,60,0.12); }
.info-text { font-size: 13px; line-height: 1.4; color: var(--accent); }
.error-box { background: var(--danger-lt); border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; border: 1px solid rgba(193,69,59,0.15); font-size: 13px; color: var(--danger); }
.success-box { background: var(--success-lt); border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; border: 1px solid rgba(45,106,79,0.15); font-size: 13px; color: var(--success); }

.step-indicator { display: flex; gap: 8px; margin-bottom: 18px; }
.step { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
.step.active { background: var(--accent); }
.step.done { background: var(--success); }

/* Invoice cards */
.invoice-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.invoice-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.invoice-name { font-size: 15px; font-weight: 700; }
.invoice-total { font-size: 15px; font-weight: 700; color: var(--accent); }
.invoice-lines { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
.invoice-status { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.invoice-status.pending { background: var(--warm); color: var(--muted); }
.invoice-status.created { background: var(--success-lt); color: var(--success); }
.invoice-status.error { background: var(--danger-lt); color: var(--danger); }

.invoice-toggle { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.toggle-btn { padding: 4px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); font-size: 11px; font-weight: 600; color: var(--muted); }
.toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.toggle-btn:disabled { opacity: 0.4; cursor: default; }

.recipient-fields { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.recipient-fields summary { cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted); list-style: none; padding: 4px 0; user-select: none; }
.recipient-fields summary::-webkit-details-marker { display: none; }
.recipient-fields summary::before { content: '▸ '; display: inline-block; transition: transform 0.15s; }
.recipient-fields[open] summary::before { transform: rotate(90deg); }
.recipient-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
.recipient-grid .full { grid-column: 1 / -1; }
.recipient-input { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; background: var(--bg); outline: none; }
.recipient-input:focus { border-color: var(--accent); }
.recipient-input.missing { border-color: var(--danger); background: var(--danger-lt); }
.recipient-status { font-size: 11px; font-weight: 600; margin-top: 6px; }
.recipient-status.ready { color: var(--success); }
.recipient-status.missing { color: var(--danger); }

.divider { border-top: 1px solid var(--border); margin: 18px 0; }

.summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
.summary-row.total { font-weight: 800; font-size: 16px; border-top: 2px solid var(--text); padding-top: 10px; margin-top: 6px; }

.loading { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.results-list { margin-top: 14px; }
</style>
</head>
<body>

<div class="header"><h1>Invoice Generator</h1></div>
<div class="content" id="app"></div>
<div style="text-align:center; padding:16px 20px 24px; font-size:11px; color:var(--muted); letter-spacing:0.03em;">
  v2026-04-19 (DD-MM-YYYY dates in Mollie line descriptions)
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────

let state = {
  step: 'settings', // settings, pick, syncing, preview, generating, results
  apiUrl: localStorage.getItem('ig_api_url') || '',
  mollieKey: localStorage.getItem('ig_mollie_key') || '',
  lessonLoggerUrl: localStorage.getItem('ig_lesson_logger_url') || '',
  selectedMonth: '', // 'YYYY-MM' chosen by the user on the pick step
  invoices: [],       // built from lesson-logger data, enriched with recipient data
  results: [],        // creation results
  syncDiagnostics: null, // { totalRows, uniqueParents, matched, unmatched } or null
  syncWarning: null,  // string if the sheet lookup failed but we fell back
  error: null,
};

// ─── API ─────────────────────────────────────────────────────────────────────

async function api(body) {
  try {
    const r = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
      redirect: 'follow',
    });
    return await r.json();
  } catch (e) {
    console.error('API error:', e);
    return { error: 'Connection error: ' + e.message };
  }
}

// Talks to the lesson-logger Apps Script (separate URL from the invoice
// generator's). Uses GET rather than POST because:
//   1. Apps Script web apps redirect POSTs through googleusercontent.com; the
//      redirected response sometimes trips CORS for cross-project calls
//      ("Failed to fetch"). GET redirects cleanly.
//   2. The lesson-logger's doGet router handles the same actions as doPost.
//   3. All the reads we do here (getAll) have no body to send.
async function lessonLoggerApi(body) {
  try {
    const params = new URLSearchParams();
    Object.entries(body || {}).forEach(([k, v]) => {
      if (v !== undefined && v !== null) params.set(k, String(v));
    });
    const sep = state.lessonLoggerUrl.indexOf('?') === -1 ? '?' : '&';
    const url = state.lessonLoggerUrl + sep + params.toString();
    const r = await fetch(url, { method: 'GET', redirect: 'follow' });
    // Guard against Apps Script returning HTML (auth/login page) instead of JSON.
    const text = await r.text();
    try {
      return JSON.parse(text);
    } catch {
      return { error: 'Lesson Logger returned non-JSON (first 120 chars): ' + text.substring(0, 120) };
    }
  } catch (e) {
    console.error('Lesson Logger API error:', e);
    return { error: 'Connection error: ' + e.message };
  }
}

// Lesson type ids in the sheet (ind_pres, ind_online, grp_pres, grp_online)
// → display labels the invoice generator uses in line descriptions. Keep in
// sync with LESSON_TYPES in the lesson logger.
const LESSON_TYPE_LABELS = {
  ind_pres:   'Ind · Pres',
  ind_online: 'Ind · Online',
  grp_pres:   'Group · Pres',
  grp_online: 'Group · Online',
};

function lessonTypeShortLabel(id) {
  return LESSON_TYPE_LABELS[id] || String(id || '');
}

// Format a YYYY-MM-DD string (as stored in the sheet) as DD-MM-YYYY, the Dutch
// convention used on invoices. If the input isn't in the expected shape, return
// it unchanged so downstream strings still render something meaningful.
function formatDateDMY(ymd) {
  const s = String(ymd || '').slice(0, 10);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m ? m[3] + '-' + m[2] + '-' + m[1] : s;
}

// Fetch + shape: pull parents/students/lessons from the lesson logger, filter
// to the chosen month, and group into per-parent invoice objects with the same
// shape the old parseExport() produced (so renderPreview/generateInvoices
// don't need any changes).
async function loadInvoicesForMonth(month) {
  const data = await lessonLoggerApi({ action: 'getAll' });
  if (!data || data.error) {
    throw new Error((data && data.error) || 'Lesson logger returned no data');
  }

  const parentById = {};
  (data.parents || []).forEach(p => { parentById[p.id] = p; });
  const studentById = {};
  (data.students || []).forEach(s => { studentById[s.id] = s; });

  const lessons = (data.lessons || []).filter(l => String(l.date || '').substring(0, 7) === month);

  const byParent = {};
  lessons.forEach(l => {
    const parent = parentById[l.parentId];
    if (!parent) return;  // orphaned lesson (parent removed / inactive in Facturas)
    if (!byParent[l.parentId]) {
      byParent[l.parentId] = { name: parent.name, lines: [], total: 0 };
    }
    const student = studentById[l.studentId];
    const studentName = student ? student.name : '(unknown student)';
    const typeLabel = lessonTypeShortLabel(l.lessonType);
    const total = Number(l.total) || 0;
    byParent[l.parentId].lines.push({
      date: l.date,
      time: l.time || '',
      student: studentName,
      type: typeLabel,
      duration: Number(l.duration) || 0,
      pricePerHour: Number(l.pricePerHour) || 0,
      total: total,
      description: studentName + ' — ' + typeLabel + ' — ' + formatDateDMY(l.date) + (l.time ? ' ' + l.time : '') + ' — ' + (Number(l.duration) || 0) + 'h',
      quantity: 1,
      unitPrice: total,
    });
    byParent[l.parentId].total += total;
  });

  // Sort by parent name, stable.
  return Object.values(byParent).sort((a, b) => a.name.localeCompare(b.name));
}

// ─── Recipient book ──────────────────────────────────────────────────────────
// Mollie's sales-invoices endpoint needs the recipient data inline every time.
// We cache what she enters once per parent so next month's run auto-populates.
// Key: normalized parent name. Value: { email, givenName, familyName, street
// AndNumber, postalCode, city, country, locale }.

function normalize(name) {
  return String(name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\s+/g, ' ').trim();
}

function slugify(name) {
  const n = normalize(name).replace(/\s+/g, '-');
  return n ? 'parent-' + n : 'parent-unknown';
}

// Naive but good enough: last whitespace-separated token is the family name,
// the rest is the given name. She can edit both in the form if wrong.
function splitName(full) {
  const parts = String(full || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return { givenName: '', familyName: '' };
  if (parts.length === 1) return { givenName: parts[0], familyName: '' };
  return {
    givenName: parts.slice(0, -1).join(' '),
    familyName: parts[parts.length - 1]
  };
}

function getRecipientBook() {
  try { return JSON.parse(localStorage.getItem('ig_recipients') || '{}'); }
  catch { return {}; }
}

function saveRecipientBook(book) {
  try { localStorage.setItem('ig_recipients', JSON.stringify(book)); } catch {}
}

// Mollie wants an ISO 3166-1 alpha-2 country code. Anything else (empty,
// "Netherlands", "nl", trailing whitespace, etc.) gets normalized to its
// 2-letter uppercase form — or cleared to empty if it can't be rescued.
function normalizeCountry(v) {
  const cleaned = String(v || '').replace(/[^a-zA-Z]/g, '').toUpperCase();
  return cleaned.length === 2 ? cleaned : '';
}

function loadRecipient(parentName) {
  const book = getRecipientBook();
  const cached = book[normalize(parentName)];
  if (cached) {
    // Strip any legacy mollieCustomerId field — we tested empirically
    // (2026-04-18) that Mollie ignores it and still requires full address.
    const { mollieCustomerId, ...rest } = cached;
    // Heal any legacy country value that isn't 2-letter ISO.
    rest.country = normalizeCountry(rest.country) || 'NL';
    return rest;
  }
  // First time we've seen this parent — seed from the name.
  const split = splitName(parentName);
  return {
    email: '',
    givenName: split.givenName,
    familyName: split.familyName,
    streetAndNumber: '',
    postalCode: '',
    city: '',
    country: 'NL',
    locale: 'en_GB',
  };
}

function saveRecipient(parentName, recipient) {
  const book = getRecipientBook();
  book[normalize(parentName)] = Object.assign({}, recipient);
  saveRecipientBook(book);
}

function forgetRecipient(parentName) {
  const book = getRecipientBook();
  delete book[normalize(parentName)];
  saveRecipientBook(book);
}

// Merge sheet data into cached (localStorage) data. Sheet wins where it has a
// non-empty value; cache fills the gaps. This means the intake sheet is the
// source of truth — if she corrects a parent's address in the form, the
// correction is only a stopgap. To make it permanent she should update the
// sheet. (Over time, filled-in fields that the sheet didn't have — like city
// — get cached locally and auto-populate next month.)
function mergeSheetIntoLocal(name, fromSheet) {
  const local = loadRecipient(name);
  if (!fromSheet) return Object.assign({}, local, { _source: 'manual', _matched: false });
  const out = Object.assign({}, local);
  ['email','givenName','familyName','streetAndNumber','postalCode','city','country','locale'].forEach(k => {
    const v = fromSheet[k];
    if (v !== null && v !== undefined && String(v).trim() !== '') {
      out[k] = String(v).trim();
    }
  });
  // Country from sheet is always 'NL' (per decision), but cached value may be
  // non-NL if she overrode earlier. We keep the cached override if it's a
  // valid 2-letter code. Otherwise default to NL.
  if (!/^[A-Z]{2}$/.test(String(out.country || '').trim())) out.country = 'NL';
  out._source = 'sheet';
  out._matched = true;
  return out;
}

// Mollie rejects drafts when any of these fields are missing — learned the hard
// way from "Field 'recipient.city' must be provided". We also tested passing
// the AR customer UUID as recipientIdentifier (2026-04-18): Mollie ignores it
// and still demands the full address. Bottom line: the full address is always
// required by the Sales Invoices API, even for a known AR customer.
const REQUIRED_RECIPIENT_FIELDS = [
  { key: 'email',           label: 'Email',         check: v => v && v.includes('@') },
  { key: 'streetAndNumber', label: 'Street + nr',   check: v => !!v },
  { key: 'postalCode',      label: 'Postcode',      check: v => !!v },
  { key: 'city',            label: 'City',          check: v => !!v },
  // Mollie requires ISO 3166-1 alpha-2 (two uppercase letters: NL, BE, DE…).
  // We auto-uppercase and cap length on input to make this near-impossible to
  // get wrong, but validate here too for legacy entries in the recipient book.
  { key: 'country',         label: 'Country (2-letter code)', check: v => /^[A-Z]{2}$/.test(String(v || '').trim()) },
];

function missingRecipientFields(r) {
  if (!r) return REQUIRED_RECIPIENT_FIELDS.map(f => f.label);
  return REQUIRED_RECIPIENT_FIELDS
    .filter(f => !f.check(String(r[f.key] || '').trim()))
    .map(f => f.label);
}

function recipientIsReady(r) {
  return missingRecipientFields(r).length === 0;
}

function fieldIsRequired(key) {
  return REQUIRED_RECIPIENT_FIELDS.some(f => f.key === key);
}

// ─── Render ──────────────────────────────────────────────────────────────────

function render() {
  const app = document.getElementById('app');
  const views = {
    settings: renderSettings,
    pick: renderPick,
    syncing: renderSyncing,
    preview: renderPreview,
    generating: renderGenerating,
    results: renderResults,
  };
  app.innerHTML = '';
  const el = (views[state.step] || renderSettings)();
  app.appendChild(el);
}

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k.startsWith('on')) el[k] = v;
    else if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'innerHTML') el.innerHTML = v;
    else if (v === true) el.setAttribute(k, '');
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function renderSteps(current) {
  const steps = ['settings', 'pick', 'preview', 'results'];
  const idx = steps.indexOf(current);
  const wrap = h('div', { className: 'step-indicator' });
  steps.forEach((s, i) => {
    wrap.appendChild(h('div', { className: 'step' + (i < idx ? ' done' : i === idx ? ' active' : '') }));
  });
  return wrap;
}

// ─── Settings ────────────────────────────────────────────────────────────────

function renderSettings() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('settings'));

  wrap.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text', innerHTML: 'Configure your connections. You need:<br>• The Invoice Generator Apps Script URL (proxy for Mollie API)<br>• The Lesson Logger Apps Script URL (source of lesson data)<br>• Your Mollie Live API key' })
  ));

  wrap.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'Invoice Generator Apps Script URL'),
    h('input', { className: 'form-input', type: 'url', id: 'cfg-url', value: state.apiUrl, placeholder: 'https://script.google.com/macros/s/...' })
  ));

  wrap.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'Lesson Logger Apps Script URL'),
    h('input', { className: 'form-input', type: 'url', id: 'cfg-ll-url', value: state.lessonLoggerUrl, placeholder: 'https://script.google.com/macros/s/...' })
  ));

  wrap.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'Mollie Live API key'),
    h('input', { className: 'form-input', type: 'password', id: 'cfg-key', value: state.mollieKey, placeholder: 'live_...' })
  ));

  wrap.appendChild(h('button', { className: 'btn-primary', onclick: () => {
    const url   = document.getElementById('cfg-url').value.trim();
    const llUrl = document.getElementById('cfg-ll-url').value.trim();
    const key   = document.getElementById('cfg-key').value.trim();
    state.apiUrl = url;
    state.lessonLoggerUrl = llUrl;
    state.mollieKey = key;
    localStorage.setItem('ig_api_url', url);
    localStorage.setItem('ig_lesson_logger_url', llUrl);
    localStorage.setItem('ig_mollie_key', key);
    state.step = 'pick';
    render();
  }}, 'Continue'));

  // Recipient book status + escape hatch.
  const book = getRecipientBook();
  const bookCount = Object.keys(book).length;
  if (bookCount > 0) {
    wrap.appendChild(h('div', {
      style: { marginTop: '18px', fontSize: '12px', color: 'var(--muted)', textAlign: 'center' }
    }, bookCount + ' saved recipient' + (bookCount !== 1 ? 's' : '')));

    wrap.appendChild(h('button', {
      className: 'btn-secondary',
      style: { marginTop: '8px' },
      onclick: () => {
        if (confirm('Forget all ' + bookCount + ' saved recipient addresses? You\'ll need to re-enter email and address for every parent next time.')) {
          localStorage.removeItem('ig_recipients');
          render();
        }
      }
    }, 'Clear saved recipients'));
  }

  return wrap;
}

// ─── Pick month ──────────────────────────────────────────────────────────────

// Build a month dropdown with the last 12 months, most recent first. We default
// to last month (the common case: invoicing at the start of a new month for
// lessons given during the previous month).
function monthOptions() {
  const out = [];
  const now = new Date();
  // Start one month ago.
  now.setDate(1);
  now.setMonth(now.getMonth() - 1);
  for (let i = 0; i < 13; i++) {  // last month + 12 prior = 13 total
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const ym = y + '-' + m;
    const label = now.toLocaleString('en-GB', { month: 'long', year: 'numeric' });
    out.push({ value: ym, label: label });
    now.setMonth(now.getMonth() - 1);
  }
  // Also include the current month at the top, in case she invoices mid-month.
  const today = new Date();
  const curY = today.getFullYear();
  const curM = String(today.getMonth() + 1).padStart(2, '0');
  const curYm = curY + '-' + curM;
  const curLabel = today.toLocaleString('en-GB', { month: 'long', year: 'numeric' }) + ' (current)';
  out.unshift({ value: curYm, label: curLabel });
  return out;
}

function renderPick() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('pick'));

  wrap.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text' }, 'Pick the month you want to invoice for. Lesson data is pulled directly from the Lesson Logger — no copy/paste.')
  ));

  const options = monthOptions();
  // Default: last month (index 1 — the first item that isn't "current").
  const defaultValue = state.selectedMonth || (options[1] ? options[1].value : options[0].value);

  const select = h('select', { className: 'form-input', id: 'pick-month' });
  options.forEach(o => {
    const opt = h('option', { value: o.value }, o.label);
    if (o.value === defaultValue) opt.setAttribute('selected', '');
    select.appendChild(opt);
  });

  wrap.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'Month to invoice'),
    select
  ));

  if (state.error) {
    wrap.appendChild(h('div', { className: 'error-box' }, state.error));
  }

  wrap.appendChild(h('button', { className: 'btn-primary', style: { marginBottom: '10px' }, onclick: async () => {
    const month = document.getElementById('pick-month').value;
    state.selectedMonth = month;
    state.error = null;
    state.syncDiagnostics = null;
    state.syncWarning = null;
    state.step = 'syncing';
    render();

    // Step 1: pull lessons + parents + students from the lesson logger.
    let invoices = [];
    try {
      invoices = await loadInvoicesForMonth(month);
    } catch (e) {
      state.error = 'Could not load lessons from the Lesson Logger: ' + e.message;
      state.step = 'pick';
      render();
      return;
    }

    if (invoices.length === 0) {
      state.error = 'No lessons found for ' + month + '. Log some lessons first, or pick another month.';
      state.step = 'pick';
      render();
      return;
    }

    state.invoices = invoices;

    // Step 2: enrich with recipient address data from the Facturas sheet.
    const parentNames = invoices.map(i => i.name);
    let lookup = null;
    try {
      const resp = await api({ action: 'lookupRecipients', parentNames });
      if (resp && resp.recipients) {
        lookup = resp.recipients;
        state.syncDiagnostics = resp.diagnostics || null;
      } else {
        state.syncWarning = 'Sheet lookup failed: ' + (resp?.error || 'unknown error') + '. Falling back to saved recipients — you may need to fill in some details manually.';
      }
    } catch (e) {
      state.syncWarning = 'Sheet lookup error: ' + e.message + '. Falling back to saved recipients.';
    }

    // Merge sheet data into each invoice; fall back to cache-only for misses.
    invoices.forEach(inv => {
      const fromSheet = lookup ? lookup[inv.name] : null;
      inv.recipient = mergeSheetIntoLocal(inv.name, fromSheet);
      saveRecipient(inv.name, inv.recipient);
      inv.include = recipientIsReady(inv.recipient);
      inv._open = !recipientIsReady(inv.recipient);
    });

    state.step = 'preview';
    render();
  }}, 'Load lessons & review'));

  wrap.appendChild(h('button', { className: 'btn-secondary', onclick: () => { state.step = 'settings'; render(); } }, '← Settings'));

  return wrap;
}

// ─── Syncing ─────────────────────────────────────────────────────────────────

function renderSyncing() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('pick'));
  wrap.appendChild(h('div', { className: 'loading' },
    h('span', { className: 'spinner' }),
    'Loading lessons for ' + (state.selectedMonth || '…') + ' and pulling parent data from the Facturas sheet…'
  ));
  wrap.appendChild(h('div', {
    style: { textAlign: 'center', fontSize: '12px', color: 'var(--muted)', marginTop: '8px' }
  }, 'First time may take a few seconds (Apps Script cold start).'));
  return wrap;
}

// ─── Preview ─────────────────────────────────────────────────────────────────

function renderPreview() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('preview'));

  if (state.syncWarning) {
    wrap.appendChild(h('div', { className: 'error-box' }, state.syncWarning));
  }

  const ready = state.invoices.filter(i => recipientIsReady(i.recipient));
  const missing = state.invoices.filter(i => !recipientIsReady(i.recipient));
  const toGenerate = state.invoices.filter(i => i.include && recipientIsReady(i.recipient));
  const grandTotal = toGenerate.reduce((s, i) => s + i.total, 0);

  wrap.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text', innerHTML:
      '<strong>' + state.invoices.length + '</strong> invoices parsed · ' +
      '<strong style="color:var(--success)">' + ready.length + '</strong> ready · ' +
      '<strong style="color:var(--danger)">' + missing.length + '</strong> incomplete'
    })
  ));

  if (state.syncDiagnostics) {
    const d = state.syncDiagnostics;
    wrap.appendChild(h('div', {
      style: { fontSize: '12px', color: 'var(--muted)', textAlign: 'center', marginBottom: '10px', lineHeight: '1.5' }
    },
      'Intake sheet: ' + d.matched + '/' + (d.matched + d.unmatched.length) + ' parents matched · ' +
      d.uniqueParents + ' unique parents in sheet'
      + (d.unmatched.length ? ' · unmatched: ' + d.unmatched.join(', ') : '')
    ));
  }

  state.invoices.forEach(inv => wrap.appendChild(renderInvoiceCard(inv)));

  wrap.appendChild(h('div', { className: 'divider' }));
  wrap.appendChild(h('div', { className: 'summary-row' },
    h('span', {}, 'Invoices to generate'),
    h('span', {}, String(toGenerate.length))
  ));
  wrap.appendChild(h('div', { className: 'summary-row total' },
    h('span', {}, 'Total'),
    h('span', {}, '€' + grandTotal.toFixed(2))
  ));

  const canGenerate = toGenerate.length > 0;
  wrap.appendChild(h('button', {
    className: 'btn-primary',
    style: { marginTop: '18px', marginBottom: '10px' },
    disabled: !canGenerate,
    onclick: () => generateInvoices()
  }, canGenerate ? 'Create ' + toGenerate.length + ' draft invoice' + (toGenerate.length !== 1 ? 's' : '') + ' in Mollie' : 'Fill all required recipient fields to continue'));

  wrap.appendChild(h('button', { className: 'btn-secondary', onclick: () => { state.step = 'pick'; state.error = null; render(); } }, '← Pick another month'));

  return wrap;
}

function renderInvoiceCard(inv) {
  const ready = recipientIsReady(inv.recipient);
  const card = h('div', { className: 'invoice-card' });

  card.appendChild(h('div', { className: 'invoice-header' },
    h('span', { className: 'invoice-name' }, inv.name),
    h('span', { className: 'invoice-total' }, '€' + inv.total.toFixed(2))
  ));

  // Source indicator — is this parent in the intake sheet, or are we
  // relying on cached / manually-entered data?
  const sourceLabel = inv.recipient._matched
    ? '📄 From intake sheet'
    : '⚠ Not in sheet — please fill manually';
  card.appendChild(h('div', {
    style: {
      fontSize: '11px', fontWeight: '600',
      color: inv.recipient._matched ? 'var(--success)' : 'var(--danger)',
      marginBottom: '4px'
    }
  }, sourceLabel));

  const missing = missingRecipientFields(inv.recipient);
  card.appendChild(h('div', {
    className: 'recipient-status ' + (ready ? 'ready' : 'missing')
  }, ready
    ? '✓ ' + inv.recipient.email
    : '✗ Missing: ' + missing.join(', ')
  ));

  // Lesson line summary
  const linesText = inv.lines.map(l => l.student + ' · ' + l.type + ' · ' + l.duration + 'h × €' + l.pricePerHour).join('\n');
  card.appendChild(h('div', { className: 'invoice-lines' }, linesText));

  // Recipient fields — <details>/<summary> native disclosure so mobile keyboards
  // and scroll position don't fight the re-render when typing.
  const details = h('details', { className: 'recipient-fields' });
  if (inv._open) details.setAttribute('open', '');
  details.addEventListener('toggle', () => {
    inv._open = details.open;
  });

  details.appendChild(h('summary', {}, ready ? 'Edit recipient details' : 'Recipient details — tap to fill'));

  const grid = h('div', { className: 'recipient-grid' });

  const fieldInput = (key, placeholder, opts = {}) => {
    const required = fieldIsRequired(key);
    const reqField = REQUIRED_RECIPIENT_FIELDS.find(f => f.key === key);
    const missing = required && !reqField.check(String(inv.recipient[key] || '').trim());
    const attrs = {
      className: 'recipient-input' + (missing ? ' missing' : ''),
      type: opts.type || 'text',
      value: inv.recipient[key] || '',
      placeholder,
      inputmode: opts.inputmode,
      autocapitalize: opts.autocapitalize,
      spellcheck: 'false',
    };
    if (opts.maxlength) attrs.maxlength = opts.maxlength;
    const input = h('input', attrs);
    input.addEventListener('input', (e) => {
      let value = e.target.value;
      // Country is ISO 3166-1 alpha-2: strip non-letters, uppercase, cap at 2.
      if (opts.transform === 'iso-country') {
        value = value.replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 2);
        if (value !== e.target.value) e.target.value = value;
      }
      inv.recipient[key] = value;
      saveRecipient(inv.name, inv.recipient);
    });
    input.addEventListener('blur', () => { render(); });
    return input;
  };

  grid.appendChild(wrapField('Email *', fieldInput('email', 'parent@example.com', { type: 'email', inputmode: 'email', autocapitalize: 'off' }), true));
  grid.appendChild(wrapField('Given name', fieldInput('givenName', 'Given')));
  grid.appendChild(wrapField('Family name', fieldInput('familyName', 'Family')));
  grid.appendChild(wrapField('Street + nr *', fieldInput('streetAndNumber', 'Main St 12'), true));
  grid.appendChild(wrapField('Postcode *', fieldInput('postalCode', '1011 AB')));
  grid.appendChild(wrapField('City *', fieldInput('city', 'Amsterdam')));
  grid.appendChild(wrapField('Country code *', fieldInput('country', 'NL', { autocapitalize: 'characters', maxlength: 2, transform: 'iso-country' })));

  details.appendChild(grid);

  // Forget this parent's saved data (resets form to blank next time they appear)
  details.appendChild(h('button', {
    className: 'btn-secondary',
    style: { marginTop: '10px', fontSize: '11px' },
    onclick: (e) => {
      e.preventDefault();
      if (confirm('Forget saved details for ' + inv.name + '?')) {
        forgetRecipient(inv.name);
        inv.recipient = loadRecipient(inv.name);
        inv.include = false;
        render();
      }
    }
  }, 'Forget this recipient'));

  card.appendChild(details);

  // Include / Skip toggle
  const toggle = h('div', { className: 'invoice-toggle' });
  const inclBtn = h('button', {
    className: 'toggle-btn' + (inv.include && ready ? ' active' : ''),
    disabled: !ready,
    onclick: () => { if (ready) { inv.include = true; render(); } }
  }, 'Include');
  const skipBtn = h('button', {
    className: 'toggle-btn' + (!inv.include ? ' active' : ''),
    onclick: () => { inv.include = false; render(); }
  }, 'Skip');
  toggle.appendChild(inclBtn);
  toggle.appendChild(skipBtn);
  card.appendChild(toggle);

  return card;
}

function wrapField(label, input, full) {
  const wrap = h('div', { className: full ? 'full' : '' });
  wrap.appendChild(h('label', { style: { fontSize: '11px', fontWeight: '600', color: 'var(--muted)', display: 'block', marginBottom: '3px' } }, label));
  wrap.appendChild(input);
  return wrap;
}

// ─── Generate ────────────────────────────────────────────────────────────────

async function generateInvoices() {
  const toGenerate = state.invoices.filter(i => i.include && recipientIsReady(i.recipient));
  state.step = 'generating';
  state.results = [];
  render();

  const mollieInvoices = toGenerate.map(inv => ({
    recipientIdentifier: slugify(inv.name),
    customerName: inv.name,
    recipient: Object.assign({ type: 'consumer', locale: 'en_GB' }, inv.recipient),
    lines: inv.lines.map(l => ({
      description: l.description,
      quantity: 1,
      unitPrice: l.total,
    })),
    memo: 'Generated from Lesson Logger',
  }));

  // Send in small batches to avoid Apps Script timeout.
  const BATCH = 5;
  for (let i = 0; i < mollieInvoices.length; i += BATCH) {
    const batch = mollieInvoices.slice(i, i + BATCH);
    const result = await api({
      action: 'createBatchInvoices',
      apiKey: state.mollieKey,
      invoices: batch,
    });

    if (result?.success && result.results) {
      state.results.push(...result.results);
    } else {
      batch.forEach(inv => {
        state.results.push({ customerName: inv.customerName, result: { error: result?.error || 'Batch failed' } });
      });
    }
    render();
  }

  state.step = 'results';
  render();
}

function renderGenerating() {
  const toGenerate = state.invoices.filter(i => i.include && recipientIsReady(i.recipient));
  const done = state.results.length;
  const total = toGenerate.length;

  const wrap = h('div');
  wrap.appendChild(h('div', { className: 'loading' },
    h('span', { className: 'spinner' }),
    'Creating invoices... ' + done + '/' + total
  ));

  if (state.results.length > 0) {
    const list = h('div', { className: 'results-list' });
    state.results.forEach(r => {
      const ok = r.result?.success;
      list.appendChild(h('div', { className: 'invoice-card' },
        h('div', { className: 'invoice-header' },
          h('span', { className: 'invoice-name' }, r.customerName),
          h('span', { className: 'invoice-status ' + (ok ? 'created' : 'error') }, ok ? '✓ Created' : '✗ Error')
        ),
        ok ? null : h('div', { className: 'recipient-status missing' }, r.result?.error || 'Unknown error')
      ));
    });
    wrap.appendChild(list);
  }

  return wrap;
}

// ─── Results ─────────────────────────────────────────────────────────────────

function renderResults() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('results'));

  const succeeded = state.results.filter(r => r.result?.success);
  const failed = state.results.filter(r => !r.result?.success);

  if (succeeded.length > 0) {
    wrap.appendChild(h('div', { className: 'success-box', innerHTML:
      '✓ <strong>' + succeeded.length + ' draft invoice' + (succeeded.length !== 1 ? 's' : '') + '</strong> created in Mollie.<br><br>' +
      'Drafts don\'t have an invoice number yet — Mollie only assigns the number when you <strong>issue</strong> the draft in the dashboard. Issuing also emails the PDF to the parent.<br><br>' +
      'Open <em>Invoicing → Sales invoices</em>, review each draft, and hit <strong>Send</strong>.'
    }));
  }

  if (failed.length > 0) {
    wrap.appendChild(h('div', { className: 'error-box' },
      '✗ ' + failed.length + ' invoice' + (failed.length !== 1 ? 's' : '') + ' failed.'
    ));
  }

  state.results.forEach(r => {
    const ok = r.result?.success;
    const card = h('div', { className: 'invoice-card' },
      h('div', { className: 'invoice-header' },
        h('span', { className: 'invoice-name' }, r.customerName),
        h('span', { className: 'invoice-status ' + (ok ? 'created' : 'error') }, ok ? '✓ Draft created' : '✗ Failed')
      )
    );
    if (ok) {
      // Mollie returns invoiceNumber only for issued invoices. For our drafts
      // we show the internal id so she can find it in the dashboard if needed.
      const label = r.result.invoiceNumber
        ? 'Invoice #' + r.result.invoiceNumber
        : 'Draft id: ' + (r.result.invoiceId || '(no id returned)') + ' · number assigned on issue';
      card.appendChild(h('div', { className: 'recipient-status ready' }, label));
    }
    if (!ok) {
      card.appendChild(h('div', { className: 'recipient-status missing' }, r.result?.error || 'Unknown error'));
    }
    wrap.appendChild(card);
  });

  wrap.appendChild(h('div', { className: 'divider' }));

  wrap.appendChild(h('button', { className: 'btn-primary', style: { marginBottom: '10px' }, onclick: () => {
    state.step = 'pick';
    state.invoices = [];
    state.results = [];
    state.error = null;
    render();
  }}, 'Generate more invoices'));

  wrap.appendChild(h('a', {
    href: 'https://my.mollie.com/dashboard/invoicing',
    target: '_blank',
    style: { display: 'block', textAlign: 'center', color: 'var(--accent)', fontSize: '14px', fontWeight: '600', marginTop: '10px', textDecoration: 'none' }
  }, 'Open Mollie Dashboard →'));

  return wrap;
}

// ─── Init ────────────────────────────────────────────────────────────────────

if (state.apiUrl && state.mollieKey && state.lessonLoggerUrl) state.step = 'pick';
render();
</script>
