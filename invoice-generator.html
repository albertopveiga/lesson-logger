<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>Invoice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F3EF; --card: #FFFFFF; --text: #1A1A1A; --muted: #8B8B8B;
  --border: #E2DFD9; --accent: #8B5E3C; --accent-lt: #F5EDE6;
  --warm: #EDE8E1; --danger: #C1453B; --danger-lt: #FFF0EF;
  --success: #2D6A4F; --success-lt: #E9F5EE;
  --radius: 14px; --font: 'DM Sans', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); max-width: 600px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; -webkit-tap-highlight-color: transparent; }
input, textarea { font-family: var(--font); }

.header { display: flex; align-items: center; justify-content: center; padding: 18px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
.header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); }
.content { padding: 16px 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 5px; }
.form-input { width: 100%; padding: 11px 13px; border-radius: 12px; border: 1px solid var(--border); font-size: 15px; background: var(--card); outline: none; }
.form-input:focus { border-color: var(--accent); }
textarea.form-input { resize: vertical; line-height: 1.5; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; }

.btn-primary { width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary { width: 100%; padding: 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; font-weight: 600; }
.btn-danger { width: 100%; padding: 12px; border-radius: var(--radius); border: none; background: var(--danger); color: #fff; font-size: 14px; font-weight: 700; }

.info-box { background: var(--accent-lt); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; border: 1px solid rgba(139,94,60,0.12); }
.info-text { font-size: 13px; line-height: 1.4; color: var(--accent); }
.error-box { background: var(--danger-lt); border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; border: 1px solid rgba(193,69,59,0.15); font-size: 13px; color: var(--danger); }
.success-box { background: var(--success-lt); border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; border: 1px solid rgba(45,106,79,0.15); font-size: 13px; color: var(--success); }

.step-indicator { display: flex; gap: 8px; margin-bottom: 18px; }
.step { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
.step.active { background: var(--accent); }
.step.done { background: var(--success); }

/* Invoice cards */
.invoice-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.invoice-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.invoice-name { font-size: 15px; font-weight: 700; }
.invoice-total { font-size: 15px; font-weight: 700; color: var(--accent); }
.invoice-lines { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
.invoice-status { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.invoice-status.pending { background: var(--warm); color: var(--muted); }
.invoice-status.created { background: var(--success-lt); color: var(--success); }
.invoice-status.error { background: var(--danger-lt); color: var(--danger); }

.invoice-toggle { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.toggle-btn { padding: 4px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); font-size: 11px; font-weight: 600; color: var(--muted); }
.toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.toggle-btn:disabled { opacity: 0.4; cursor: default; }

.recipient-fields { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.recipient-fields summary { cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted); list-style: none; padding: 4px 0; user-select: none; }
.recipient-fields summary::-webkit-details-marker { display: none; }
.recipient-fields summary::before { content: '▸ '; display: inline-block; transition: transform 0.15s; }
.recipient-fields[open] summary::before { transform: rotate(90deg); }
.recipient-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
.recipient-grid .full { grid-column: 1 / -1; }
.recipient-input { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; background: var(--bg); outline: none; }
.recipient-input:focus { border-color: var(--accent); }
.recipient-input.missing { border-color: var(--danger); background: var(--danger-lt); }
.recipient-status { font-size: 11px; font-weight: 600; margin-top: 6px; }
.recipient-status.ready { color: var(--success); }
.recipient-status.missing { color: var(--danger); }

.divider { border-top: 1px solid var(--border); margin: 18px 0; }

.summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
.summary-row.total { font-weight: 800; font-size: 16px; border-top: 2px solid var(--text); padding-top: 10px; margin-top: 6px; }

.loading { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.results-list { margin-top: 14px; }
</style>
</head>
<body>

<div class="header"><h1>Invoice Generator</h1></div>
<div class="content" id="app"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────

let state = {
  step: 'settings', // settings, paste, preview, generating, results
  apiUrl: localStorage.getItem('ig_api_url') || '',
  mollieKey: localStorage.getItem('ig_mollie_key') || '',
  exportText: '',
  invoices: [],       // parsed from export, enriched with recipient data
  results: [],        // creation results
  error: null,
};

// ─── API ─────────────────────────────────────────────────────────────────────

async function api(body) {
  try {
    const r = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
      redirect: 'follow',
    });
    return await r.json();
  } catch (e) {
    console.error('API error:', e);
    return { error: 'Connection error: ' + e.message };
  }
}

// ─── Parser ──────────────────────────────────────────────────────────────────

function parseExport(text) {
  const invoices = [];
  let currentParent = null;

  const lines = text.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();

    // Parent line: "▸ Parent Name"
    if (trimmed.startsWith('▸')) {
      const name = trimmed.substring(1).trim();
      currentParent = { name, lines: [], total: 0 };
      invoices.push(currentParent);
      continue;
    }

    // Lesson line: "  2026-04-14 18:35  Student  Type  1h × €50 = €50.00"
    if (currentParent && trimmed.match(/^\d{4}-\d{2}-\d{2}/)) {
      const match = trimmed.match(/^(\d{4}-\d{2}-\d{2})\s*(\d{2}:\d{2})?\s+(.+?)\s+(Ind · Pres|Ind · Online|Group · Pres|Group · Online)\s+(\d+\.?\d*)\s*h\s*×\s*€\s*(\d+\.?\d*)\s*=\s*€\s*(\d+\.?\d*)/);
      if (match) {
        currentParent.lines.push({
          date: match[1],
          time: match[2] || '',
          student: match[3].trim(),
          type: match[4],
          duration: parseFloat(match[5]),
          pricePerHour: parseFloat(match[6]),
          total: parseFloat(match[7]),
          description: match[3].trim() + ' — ' + match[4] + ' — ' + match[1] + (match[2] ? ' ' + match[2] : '') + ' — ' + match[5] + 'h',
          quantity: 1,
          unitPrice: parseFloat(match[7]),
        });
        currentParent.total += parseFloat(match[7]);
      }
    }
  }

  return invoices;
}

// ─── Recipient book ──────────────────────────────────────────────────────────
// Mollie's sales-invoices endpoint needs the recipient data inline every time.
// We cache what she enters once per parent so next month's run auto-populates.
// Key: normalized parent name. Value: { email, givenName, familyName, street
// AndNumber, postalCode, city, country, locale }.

function normalize(name) {
  return String(name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\s+/g, ' ').trim();
}

function slugify(name) {
  const n = normalize(name).replace(/\s+/g, '-');
  return n ? 'parent-' + n : 'parent-unknown';
}

// Naive but good enough: last whitespace-separated token is the family name,
// the rest is the given name. She can edit both in the form if wrong.
function splitName(full) {
  const parts = String(full || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return { givenName: '', familyName: '' };
  if (parts.length === 1) return { givenName: parts[0], familyName: '' };
  return {
    givenName: parts.slice(0, -1).join(' '),
    familyName: parts[parts.length - 1]
  };
}

function getRecipientBook() {
  try { return JSON.parse(localStorage.getItem('ig_recipients') || '{}'); }
  catch { return {}; }
}

function saveRecipientBook(book) {
  try { localStorage.setItem('ig_recipients', JSON.stringify(book)); } catch {}
}

function loadRecipient(parentName) {
  const book = getRecipientBook();
  const cached = book[normalize(parentName)];
  if (cached) return Object.assign({}, cached);
  // First time we've seen this parent — seed from the name.
  const split = splitName(parentName);
  return {
    email: '',
    givenName: split.givenName,
    familyName: split.familyName,
    streetAndNumber: '',
    postalCode: '',
    city: '',
    country: 'NL',
    locale: 'nl_NL',
  };
}

function saveRecipient(parentName, recipient) {
  const book = getRecipientBook();
  book[normalize(parentName)] = Object.assign({}, recipient);
  saveRecipientBook(book);
}

function forgetRecipient(parentName) {
  const book = getRecipientBook();
  delete book[normalize(parentName)];
  saveRecipientBook(book);
}

// Minimum required data to send to Mollie. Email alone is the hard floor; the
// others are recommended but Mollie may create a draft without them (she can
// fill in missing fields in the Mollie UI before sending).
function recipientIsReady(r) {
  return !!(r && r.email && r.email.includes('@'));
}

// ─── Render ──────────────────────────────────────────────────────────────────

function render() {
  const app = document.getElementById('app');
  const views = {
    settings: renderSettings,
    paste: renderPaste,
    preview: renderPreview,
    generating: renderGenerating,
    results: renderResults,
  };
  app.innerHTML = '';
  const el = (views[state.step] || renderSettings)();
  app.appendChild(el);
}

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k.startsWith('on')) el[k] = v;
    else if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'innerHTML') el.innerHTML = v;
    else if (v === true) el.setAttribute(k, '');
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function renderSteps(current) {
  const steps = ['settings', 'paste', 'preview', 'results'];
  const idx = steps.indexOf(current);
  const wrap = h('div', { className: 'step-indicator' });
  steps.forEach((s, i) => {
    wrap.appendChild(h('div', { className: 'step' + (i < idx ? ' done' : i === idx ? ' active' : '') }));
  });
  return wrap;
}

// ─── Settings ────────────────────────────────────────────────────────────────

function renderSettings() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('settings'));

  wrap.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text', innerHTML: 'Configure your connections. You need:<br>• The Apps Script URL (proxy for Mollie API)<br>• Your Mollie Live API key' })
  ));

  wrap.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'Apps Script URL'),
    h('input', { className: 'form-input', type: 'url', id: 'cfg-url', value: state.apiUrl, placeholder: 'https://script.google.com/macros/s/...' })
  ));

  wrap.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'Mollie Live API key'),
    h('input', { className: 'form-input', type: 'password', id: 'cfg-key', value: state.mollieKey, placeholder: 'live_...' })
  ));

  wrap.appendChild(h('button', { className: 'btn-primary', onclick: () => {
    const url = document.getElementById('cfg-url').value.trim();
    const key = document.getElementById('cfg-key').value.trim();
    state.apiUrl = url;
    state.mollieKey = key;
    localStorage.setItem('ig_api_url', url);
    localStorage.setItem('ig_mollie_key', key);
    state.step = 'paste';
    render();
  }}, 'Continue'));

  // Recipient book status + escape hatch.
  const book = getRecipientBook();
  const bookCount = Object.keys(book).length;
  if (bookCount > 0) {
    wrap.appendChild(h('div', {
      style: { marginTop: '18px', fontSize: '12px', color: 'var(--muted)', textAlign: 'center' }
    }, bookCount + ' saved recipient' + (bookCount !== 1 ? 's' : '')));

    wrap.appendChild(h('button', {
      className: 'btn-secondary',
      style: { marginTop: '8px' },
      onclick: () => {
        if (confirm('Forget all ' + bookCount + ' saved recipient addresses? You\'ll need to re-enter email and address for every parent next time.')) {
          localStorage.removeItem('ig_recipients');
          render();
        }
      }
    }, 'Clear saved recipients'));
  }

  return wrap;
}

// ─── Paste ───────────────────────────────────────────────────────────────────

function renderPaste() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('paste'));

  wrap.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text' }, 'Paste the export from the Lesson Logger app. Use the "Copy invoice data" button in the Export section.')
  ));

  wrap.appendChild(h('div', { className: 'form-group' },
    h('label', { className: 'form-label' }, 'Invoice export data'),
    h('textarea', { className: 'form-input', id: 'export-text', rows: '12', placeholder: 'INVOICE DATA — April 2026\n═══════\n\n▸ Parent Name\n  2026-04-14 18:00  Student  Ind · Pres  1h × €50 = €50.00\n  ...' })
  ));

  if (state.error) {
    wrap.appendChild(h('div', { className: 'error-box' }, state.error));
  }

  wrap.appendChild(h('button', { className: 'btn-primary', style: { marginBottom: '10px' }, onclick: () => {
    const text = document.getElementById('export-text').value;
    if (!text.trim()) { state.error = 'Please paste the export data'; render(); return; }

    const invoices = parseExport(text);
    if (invoices.length === 0) { state.error = 'Could not parse any invoices from this text'; render(); return; }

    // Hydrate each invoice with recipient data from the local book.
    invoices.forEach(inv => {
      inv.recipient = loadRecipient(inv.name);
      inv.include = recipientIsReady(inv.recipient);
      inv._open = !recipientIsReady(inv.recipient); // auto-expand fields when incomplete
    });

    state.exportText = text;
    state.invoices = invoices;
    state.error = null;
    state.step = 'preview';
    render();
  }}, 'Parse & review'));

  wrap.appendChild(h('button', { className: 'btn-secondary', onclick: () => { state.step = 'settings'; render(); } }, '← Settings'));

  return wrap;
}

// ─── Preview ─────────────────────────────────────────────────────────────────

function renderPreview() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('preview'));

  const ready = state.invoices.filter(i => recipientIsReady(i.recipient));
  const missing = state.invoices.filter(i => !recipientIsReady(i.recipient));
  const toGenerate = state.invoices.filter(i => i.include && recipientIsReady(i.recipient));
  const grandTotal = toGenerate.reduce((s, i) => s + i.total, 0);

  wrap.appendChild(h('div', { className: 'info-box' },
    h('p', { className: 'info-text', innerHTML:
      '<strong>' + state.invoices.length + '</strong> invoices parsed · ' +
      '<strong style="color:var(--success)">' + ready.length + '</strong> ready · ' +
      '<strong style="color:var(--danger)">' + missing.length + '</strong> missing email'
    })
  ));

  state.invoices.forEach(inv => wrap.appendChild(renderInvoiceCard(inv)));

  wrap.appendChild(h('div', { className: 'divider' }));
  wrap.appendChild(h('div', { className: 'summary-row' },
    h('span', {}, 'Invoices to generate'),
    h('span', {}, String(toGenerate.length))
  ));
  wrap.appendChild(h('div', { className: 'summary-row total' },
    h('span', {}, 'Total'),
    h('span', {}, '€' + grandTotal.toFixed(2))
  ));

  const canGenerate = toGenerate.length > 0;
  wrap.appendChild(h('button', {
    className: 'btn-primary',
    style: { marginTop: '18px', marginBottom: '10px' },
    disabled: !canGenerate,
    onclick: () => generateInvoices()
  }, canGenerate ? 'Create ' + toGenerate.length + ' draft invoice' + (toGenerate.length !== 1 ? 's' : '') + ' in Mollie' : 'Add email for each parent to continue'));

  wrap.appendChild(h('button', { className: 'btn-secondary', onclick: () => { state.step = 'paste'; state.error = null; render(); } }, '← Back to paste'));

  return wrap;
}

function renderInvoiceCard(inv) {
  const ready = recipientIsReady(inv.recipient);
  const card = h('div', { className: 'invoice-card' });

  card.appendChild(h('div', { className: 'invoice-header' },
    h('span', { className: 'invoice-name' }, inv.name),
    h('span', { className: 'invoice-total' }, '€' + inv.total.toFixed(2))
  ));

  card.appendChild(h('div', {
    className: 'recipient-status ' + (ready ? 'ready' : 'missing')
  }, ready
    ? '✓ ' + inv.recipient.email
    : '✗ Email required before this invoice can be sent'
  ));

  // Lesson line summary
  const linesText = inv.lines.map(l => l.student + ' · ' + l.type + ' · ' + l.duration + 'h × €' + l.pricePerHour).join('\n');
  card.appendChild(h('div', { className: 'invoice-lines' }, linesText));

  // Recipient fields — <details>/<summary> native disclosure so mobile keyboards
  // and scroll position don't fight the re-render when typing.
  const details = h('details', { className: 'recipient-fields' });
  if (inv._open) details.setAttribute('open', '');
  details.addEventListener('toggle', () => {
    inv._open = details.open;
  });

  details.appendChild(h('summary', {}, ready ? 'Edit recipient details' : 'Recipient details — tap to fill'));

  const grid = h('div', { className: 'recipient-grid' });

  const fieldInput = (key, placeholder, opts = {}) => {
    const input = h('input', {
      className: 'recipient-input' + (opts.required && !String(inv.recipient[key] || '').trim() ? ' missing' : ''),
      type: opts.type || 'text',
      value: inv.recipient[key] || '',
      placeholder,
      inputmode: opts.inputmode,
      autocapitalize: opts.autocapitalize,
      spellcheck: 'false',
    });
    input.addEventListener('input', (e) => {
      inv.recipient[key] = e.target.value;
      // Persist on every keystroke — cheap and resilient.
      saveRecipient(inv.name, inv.recipient);
      // Don't re-render; let the keyboard stay open.
    });
    input.addEventListener('blur', () => {
      // One render on blur so the "ready" badge updates without disrupting input.
      render();
    });
    return input;
  };

  grid.appendChild(wrapField('Email *', fieldInput('email', 'parent@example.com', { type: 'email', inputmode: 'email', autocapitalize: 'off', required: true }), true));
  grid.appendChild(wrapField('Given name', fieldInput('givenName', 'Given')));
  grid.appendChild(wrapField('Family name', fieldInput('familyName', 'Family')));
  grid.appendChild(wrapField('Street + nr', fieldInput('streetAndNumber', 'Main St 12'), true));
  grid.appendChild(wrapField('Postcode', fieldInput('postalCode', '1011 AB')));
  grid.appendChild(wrapField('City', fieldInput('city', 'Amsterdam')));
  grid.appendChild(wrapField('Country', fieldInput('country', 'NL', { autocapitalize: 'characters' })));

  details.appendChild(grid);

  // Forget this parent's saved data (resets form to blank next time they appear)
  details.appendChild(h('button', {
    className: 'btn-secondary',
    style: { marginTop: '10px', fontSize: '11px' },
    onclick: (e) => {
      e.preventDefault();
      if (confirm('Forget saved details for ' + inv.name + '?')) {
        forgetRecipient(inv.name);
        inv.recipient = loadRecipient(inv.name);
        inv.include = false;
        render();
      }
    }
  }, 'Forget this recipient'));

  card.appendChild(details);

  // Include / Skip toggle
  const toggle = h('div', { className: 'invoice-toggle' });
  const inclBtn = h('button', {
    className: 'toggle-btn' + (inv.include && ready ? ' active' : ''),
    disabled: !ready,
    onclick: () => { if (ready) { inv.include = true; render(); } }
  }, 'Include');
  const skipBtn = h('button', {
    className: 'toggle-btn' + (!inv.include ? ' active' : ''),
    onclick: () => { inv.include = false; render(); }
  }, 'Skip');
  toggle.appendChild(inclBtn);
  toggle.appendChild(skipBtn);
  card.appendChild(toggle);

  return card;
}

function wrapField(label, input, full) {
  const wrap = h('div', { className: full ? 'full' : '' });
  wrap.appendChild(h('label', { style: { fontSize: '11px', fontWeight: '600', color: 'var(--muted)', display: 'block', marginBottom: '3px' } }, label));
  wrap.appendChild(input);
  return wrap;
}

// ─── Generate ────────────────────────────────────────────────────────────────

async function generateInvoices() {
  const toGenerate = state.invoices.filter(i => i.include && recipientIsReady(i.recipient));
  state.step = 'generating';
  state.results = [];
  render();

  const mollieInvoices = toGenerate.map(inv => ({
    recipientIdentifier: slugify(inv.name),
    customerName: inv.name,
    recipient: Object.assign({ type: 'consumer', locale: 'nl_NL' }, inv.recipient),
    lines: inv.lines.map(l => ({
      description: l.description,
      quantity: 1,
      unitPrice: l.total,
    })),
    memo: 'Generated from Lesson Logger',
  }));

  // Send in small batches to avoid Apps Script timeout.
  const BATCH = 5;
  for (let i = 0; i < mollieInvoices.length; i += BATCH) {
    const batch = mollieInvoices.slice(i, i + BATCH);
    const result = await api({
      action: 'createBatchInvoices',
      apiKey: state.mollieKey,
      invoices: batch,
    });

    if (result?.success && result.results) {
      state.results.push(...result.results);
    } else {
      batch.forEach(inv => {
        state.results.push({ customerName: inv.customerName, result: { error: result?.error || 'Batch failed' } });
      });
    }
    render();
  }

  state.step = 'results';
  render();
}

function renderGenerating() {
  const toGenerate = state.invoices.filter(i => i.include && recipientIsReady(i.recipient));
  const done = state.results.length;
  const total = toGenerate.length;

  const wrap = h('div');
  wrap.appendChild(h('div', { className: 'loading' },
    h('span', { className: 'spinner' }),
    'Creating invoices... ' + done + '/' + total
  ));

  if (state.results.length > 0) {
    const list = h('div', { className: 'results-list' });
    state.results.forEach(r => {
      const ok = r.result?.success;
      list.appendChild(h('div', { className: 'invoice-card' },
        h('div', { className: 'invoice-header' },
          h('span', { className: 'invoice-name' }, r.customerName),
          h('span', { className: 'invoice-status ' + (ok ? 'created' : 'error') }, ok ? '✓ Created' : '✗ Error')
        ),
        ok ? null : h('div', { className: 'recipient-status missing' }, r.result?.error || 'Unknown error')
      ));
    });
    wrap.appendChild(list);
  }

  return wrap;
}

// ─── Results ─────────────────────────────────────────────────────────────────

function renderResults() {
  const wrap = h('div');
  wrap.appendChild(renderSteps('results'));

  const succeeded = state.results.filter(r => r.result?.success);
  const failed = state.results.filter(r => !r.result?.success);

  if (succeeded.length > 0) {
    wrap.appendChild(h('div', { className: 'success-box' },
      '✓ ' + succeeded.length + ' draft invoice' + (succeeded.length !== 1 ? 's' : '') + ' created in Mollie. Review and send them from your Mollie Dashboard → Invoicing.'
    ));
  }

  if (failed.length > 0) {
    wrap.appendChild(h('div', { className: 'error-box' },
      '✗ ' + failed.length + ' invoice' + (failed.length !== 1 ? 's' : '') + ' failed.'
    ));
  }

  state.results.forEach(r => {
    const ok = r.result?.success;
    const card = h('div', { className: 'invoice-card' },
      h('div', { className: 'invoice-header' },
        h('span', { className: 'invoice-name' }, r.customerName),
        h('span', { className: 'invoice-status ' + (ok ? 'created' : 'error') }, ok ? '✓ Draft created' : '✗ Failed')
      )
    );
    if (ok && r.result.invoiceNumber) {
      card.appendChild(h('div', { className: 'recipient-status ready' }, 'Invoice #' + r.result.invoiceNumber));
    }
    if (!ok) {
      card.appendChild(h('div', { className: 'recipient-status missing' }, r.result?.error || 'Unknown error'));
    }
    wrap.appendChild(card);
  });

  wrap.appendChild(h('div', { className: 'divider' }));

  wrap.appendChild(h('button', { className: 'btn-primary', style: { marginBottom: '10px' }, onclick: () => {
    state.step = 'paste';
    state.invoices = [];
    state.results = [];
    state.error = null;
    render();
  }}, 'Generate more invoices'));

  wrap.appendChild(h('a', {
    href: 'https://my.mollie.com/dashboard/invoicing',
    target: '_blank',
    style: { display: 'block', textAlign: 'center', color: 'var(--accent)', fontSize: '14px', fontWeight: '600', marginTop: '10px', textDecoration: 'none' }
  }, 'Open Mollie Dashboard →'));

  return wrap;
}

// ─── Init ────────────────────────────────────────────────────────────────────

if (state.apiUrl && state.mollieKey) state.step = 'paste';
render();
</script>
</body>
</html>
